openapi: 3.1.0
info:
  title: AiGo Agent-Friendly Places API
  version: 0.1.0
  description: |
    AiGo MVP API for external agents that collect, compare, create, update,
    search, and inspect kid-friendly place data. Natural-language parsing is
    intentionally outside this API; agents should send structured JSON.
servers:
  - url: http://localhost:3000
security:
  - bearerApiKey: []
paths:
  /v1/places/search:
    post:
      summary: Search places with soft matching
      operationId: searchPlaces
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchPlacesRequest"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchPlacesResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/places/duplicates:
    post:
      summary: Find possible duplicate places before create or update
      operationId: findDuplicatePlaces
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DuplicatePlaceRequest"
      responses:
        "200":
          description: Duplicate candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicatePlaceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/places/image-health:
    get:
      summary: List image coverage and review queues for place data agents
      operationId: listPlaceImageHealth
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [attention, no_active_image, rejected_only, needs_review, pending_review, no_primary, healthy, all]
            default: attention
          description: Queue selector. `attention` returns everything except healthy rows.
        - name: primaryCategory
          in: query
          required: false
          schema:
            type: string
          description: Optional primary category filter such as `family_restaurant` or `park`.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 5000
            default: 0
      responses:
        "200":
          description: Image health queue rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceImageHealthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/places:
    post:
      summary: Create a place and publish it immediately
      operationId: createPlace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlaceRequest"
      responses:
        "201":
          description: Created place detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/places/{placeId}:
    get:
      summary: Get place detail
      operationId: getPlace
      parameters:
        - $ref: "#/components/parameters/PlaceId"
      responses:
        "200":
          description: Place detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      summary: Update a place and append a wiki-style version
      operationId: updatePlace
      parameters:
        - $ref: "#/components/parameters/PlaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlaceRequest"
      responses:
        "200":
          description: Updated place detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Soft-delete a place
      description: Marks the place `closed` so it is excluded from search while preserving sources, images, and version history. Requires an explicit confirmation payload with the current place name, source provenance, and change summary.
      operationId: deletePlace
      parameters:
        - $ref: "#/components/parameters/PlaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeletePlaceRequest"
      responses:
        "200":
          description: Deleted place summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePlaceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/places/{placeId}/versions:
    get:
      summary: List place versions
      operationId: listPlaceVersions
      parameters:
        - $ref: "#/components/parameters/PlaceId"
      responses:
        "200":
          description: Version list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/PlaceVersionSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/places/{placeId}/versions/{versionId}:
    get:
      summary: Get a specific place version
      operationId: getPlaceVersion
      parameters:
        - $ref: "#/components/parameters/PlaceId"
        - name: versionId
          in: path
          required: true
          schema:
            type: string
          description: Version UUID or version number.
      responses:
        "200":
          description: Version detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceVersion"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  securitySchemes:
    bearerApiKey:
      type: http
      scheme: bearer
      bearerFormat: AIGO_API_KEY
  parameters:
    PlaceId:
      name: placeId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
        details: {}
    Origin:
      type: object
      required: [lat, lng]
      properties:
        lat:
          type: number
          minimum: -90
          maximum: 90
        lng:
          type: number
          minimum: -180
          maximum: 180
        label:
          type: string
    TriState:
      type: string
      enum: [yes, no, partial, unknown]
    IndoorType:
      type: string
      enum: [indoor, outdoor, mixed, unknown]
    ParkingFrictionLevel:
      type: string
      enum: [low, medium, high, unknown]
      description: Parent-facing parking difficulty signal; use unknown when source evidence is weak.
    PrimaryCategory:
      type: string
      enum:
        - kids_cafe
        - indoor_playground
        - toy_store
        - toy_library
        - library
        - museum
        - science_museum
        - experience_center
        - aquarium_zoo
        - park
        - family_cafe
        - family_restaurant
        - sports_venue
        - shopping_mall
        - rest_area
        - accommodation
      description: Closed top-level place category set. Finer classification belongs in taxonomy facets.
    SourceType:
      type: string
      enum:
        - official_site
        - public_agency
        - public_tourism
        - operator_page
        - public_listing
        - public_blog
        - user_observation
        - agent_observation
        - official_image_source
        - public_listing_image_source
        - public_news_image_source
        - map_service
        - geocode
        - unknown
      description: Canonical source provenance type. Common aliases such as `official`, `official_page`, `blog`, `public_data_mirror`, and image-source variants are normalized by the API.
    RelatedPlaceRelationType:
      type: string
      enum: [nearby, same_building, same_site, parent_child, route_pair, itinerary_cluster]
      description: Agent-maintained relationship between two registered places. Use itinerary_cluster for day-trip clusters with shared drive burden, meal/rest fallback, and parent-effort evidence. Relations are stored once and returned bidirectionally.
    SourceInput:
      type: object
      required: [sourceType]
      properties:
        sourceType:
          $ref: "#/components/schemas/SourceType"
        title:
          type: string
        url:
          type: string
          format: uri
        externalId:
          type: string
        summary:
          type: string
          maxLength: 2000
        checkedAt:
          type: string
          format: date-time
      anyOf:
        - required: [url]
        - required: [externalId]
    RelatedPlaceInput:
      type: object
      required: [placeId]
      properties:
        placeId:
          type: string
          format: uuid
        relationType:
          $ref: "#/components/schemas/RelatedPlaceRelationType"
          default: nearby
        note:
          type: string
          maxLength: 1000
        evidence:
          type: object
          description: Agent-maintained relation evidence such as distance meters, address match, source URLs, or audit batch id. For itinerary_cluster relations, include fields such as clusterName, sharedDriveBurden, mealRestFallback, parentEffortNotes, and sourceUrls when available.
          additionalProperties: true
    PricingItem:
      type: object
      required: [label]
      properties:
        label:
          type: string
          description: Human-readable price row such as child 2-hour pass, guardian entry, infant free condition, weekday rate, or reservation price.
        amount:
          type: integer
          minimum: 0
          maximum: 100000000
          description: KRW amount when the source provides a fixed numeric price. Omit instead of guessing.
        currency:
          type: string
          enum: [KRW]
          default: KRW
        unit:
          type: string
          description: Price unit such as person, child, guardian, 2 hours, night, or session.
        ageRange:
          type: string
          description: Source-backed age/person condition for this price row.
        conditions:
          type: string
          description: Weekday/weekend, reservation, companion, free-entry, or time-limit conditions.
        notes:
          type: string
        sourceUrl:
          type: string
          format: uri
    Pricing:
      type: object
      description: Source-backed fee summary for paid places. Prices change often, so include `basisDate` or `checkedAt` whenever prices are known and omit unknown amounts instead of estimating.
      properties:
        summary:
          type: string
          maxLength: 1000
          description: Compact parent-facing summary shown on cards/details.
        currency:
          type: string
          enum: [KRW]
          default: KRW
        basisDate:
          type: string
          format: date
          description: Date the listed prices apply to or were published, in YYYY-MM-DD.
        checkedAt:
          type: string
          format: date-time
          description: Agent/source verification timestamp for the price information.
        staleAfterDays:
          type: integer
          minimum: 1
          maximum: 730
          description: Optional freshness window after which the UI should show the price as needing recheck.
        items:
          type: array
          maxItems: 50
          items:
            $ref: "#/components/schemas/PricingItem"
        sourceUrl:
          type: string
          format: uri
        sourceTitle:
          type: string
        notes:
          type: string
    PlaceWritableFields:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        primaryCategory:
          $ref: "#/components/schemas/PrimaryCategory"
        tags:
          type: array
          items:
            type: string
          maxItems: 50
        description:
          type: string
        address:
          type: string
        roadAddress:
          type: string
        regionSido:
          type: string
        regionSigungu:
          type: string
        regionDong:
          type: string
        lat:
          type: number
          minimum: -90
          maximum: 90
        lng:
          type: number
          minimum: -180
          maximum: 180
        phone:
          type: string
        officialUrl:
          type: string
          format: uri
        reservationUrl:
          type: string
          format: uri
        kakaoPlaceUrl:
          type: string
          format: uri
        kakaoPlaceId:
          type: string
        externalRefs:
          type: object
          description: Optional external reference object used for JSON containment duplicate matching against stored `externalRefs`. Agents may store public parent-inspection links such as `infoLinks` and `reviewLinks` here.
          additionalProperties: true
        playFeatures:
          $ref: "#/components/schemas/PlayFeatures"
        pricing:
          $ref: "#/components/schemas/Pricing"
        imageUrls:
          type: array
          deprecated: true
          description: Backward-compatible shorthand. New agents should use `images`; these URLs are translated into `place_images` records.
          items:
            type: string
            format: uri
        images:
          type: array
          description: First-class image records attached to the place. Use this for audited image links, visual descriptions, and primary-image selection.
          maxItems: 30
          items:
            $ref: "#/components/schemas/PlaceImageInput"
        relatedPlaces:
          type: array
          description: Existing places that should be shown as related to this place, usually because they share a building, campus, resort, mall, or very close practical visit context.
          maxItems: 50
          items:
            $ref: "#/components/schemas/RelatedPlaceInput"
        status:
          type: string
          enum: [active, temporarily_closed, closed, draft, needs_review]
        dataConfidence:
          type: string
          enum: [official_verified, operator_curated, agent_collected, user_reported, needs_check, unknown]
        placeScore:
          type: number
          minimum: 0
          maximum: 10
          description: Source-backed objective 0-10 place score assigned by agents for the family outing use case. This is not an AiGo user rating.
        placeScoreRationale:
          type: string
          description: Concise agent-written rationale for the objective place score.
        externalRatingScore:
          type: number
          minimum: 0
          maximum: 10
          description: Normalized 0-10 third-party review/rating signal when citeable evidence exists.
        externalReviewCount:
          type: integer
          minimum: 0
          description: Approximate source-backed external review count used to weight rating confidence.
        searchEvidenceScore:
          type: number
          minimum: 0
          maximum: 10
          description: Normalized 0-10 evidence/prominence score derived from public search results, listings, official pages, and corroborating sources.
        scoreSignals:
          type: object
          description: Structured source-backed scoring evidence, such as provider ratings, search-result observations, caps, conflicts, and freshness notes.
          additionalProperties: true
        scoreUpdatedAt:
          type: string
          format: date-time
          description: Timestamp when the score fields were last reviewed or recomputed.
        minRecommendedAgeMonths:
          type: integer
          minimum: 0
          maximum: 240
          description: Minimum recommended child age in months. When both age bounds are provided, this value must be less than or equal to `maxRecommendedAgeMonths`.
        maxRecommendedAgeMonths:
          type: integer
          minimum: 0
          maximum: 240
          description: Maximum recommended child age in months. When both age bounds are provided, this value must be greater than or equal to `minRecommendedAgeMonths`.
        indoorType:
          $ref: "#/components/schemas/IndoorType"
        strollerFriendly:
          $ref: "#/components/schemas/TriState"
        parkingAvailable:
          $ref: "#/components/schemas/TriState"
        parkingFrictionLevel:
          $ref: "#/components/schemas/ParkingFrictionLevel"
        peakParkingWindow:
          type: string
          maxLength: 500
          description: Source-backed time window when parking is most likely to be difficult.
        parkingWaitNote:
          type: string
          maxLength: 1000
          description: Practical parent note about parking entry, queues, validation, or fallback lots.
        nursingRoom:
          $ref: "#/components/schemas/TriState"
        diaperChangingTable:
          $ref: "#/components/schemas/TriState"
        kidsToilet:
          $ref: "#/components/schemas/TriState"
        elevator:
          $ref: "#/components/schemas/TriState"
        babyChair:
          $ref: "#/components/schemas/TriState"
        foodAllowed:
          $ref: "#/components/schemas/TriState"
        reservationRequired:
          $ref: "#/components/schemas/TriState"
          description: Whether advance reservation is required for a normal family visit.
        walkInAvailable:
          $ref: "#/components/schemas/TriState"
          description: Whether same-day walk-in entry is normally possible.
        sessionBased:
          $ref: "#/components/schemas/TriState"
          description: Whether visits are organized into fixed sessions or entry windows.
        sameDayAvailabilityKnown:
          $ref: "#/components/schemas/TriState"
          description: Whether same-day availability can be checked from source-backed public information.
        averageStayMinutes:
          type: integer
        parentEffortLevel:
          type: integer
          minimum: 1
          maximum: 5
        childEngagementLevel:
          type: integer
          minimum: 1
          maximum: 5
        rainyDayScore:
          type: integer
          minimum: 1
          maximum: 5
        hotDayScore:
          type: integer
          minimum: 1
          maximum: 5
        coldDayScore:
          type: integer
          minimum: 1
          maximum: 5
        safetyNotes:
          type: string
        parentNotes:
          type: string
        openingHours: {}
    CreatePlaceRequest:
      allOf:
        - $ref: "#/components/schemas/PlaceWritableFields"
        - type: object
          description: Create requires either `address` or `regionSido` so the place can be grouped geographically even when one address form is unavailable.
          required: [name, primaryCategory, lat, lng, sources]
          anyOf:
            - required: [address]
            - required: [regionSido]
          properties:
            sources:
              type: array
              minItems: 1
              items:
                $ref: "#/components/schemas/SourceInput"
            actor:
              type: string
              default: agent
            changeSummary:
              type: string
    UpdatePlaceRequest:
      allOf:
        - $ref: "#/components/schemas/PlaceWritableFields"
        - type: object
          description: Update requires source provenance. If one coordinate is changed, both `lat` and `lng` must be sent together; when both age bounds are sent, min must be less than or equal to max.
          required: [sources]
          dependentRequired:
            lat: [lng]
            lng: [lat]
          properties:
            sources:
              type: array
              minItems: 1
              items:
                $ref: "#/components/schemas/SourceInput"
            sourceMode:
              type: string
              enum: [append, replace]
              default: append
              description: Append new provenance by default. Use replace only to correct a bad import or source contamination.
            imageMode:
              type: string
              enum: [append, replace]
              default: append
              description: Append image records by default. Use replace after manual visual audit to keep only meaningful active images.
            relatedPlaceMode:
              type: string
              enum: [append, replace]
              default: append
              description: Append related-place pairs by default. Use replace to rewrite this place's current relationship set.
            actor:
              type: string
              default: agent
            changeSummary:
              type: string
    SearchPlacesRequest:
      type: object
      properties:
        visitContext:
          type: string
          enum: [afterDaycare, nearbyNow, rainyDay, weekendHalfDay, dayTrip]
          description: Soft ranking context for common parent outing scenarios.
        visitDate:
          type: string
          format: date
          description: Planned local visit date used for opening-hours scoring. When omitted, immediate searches use the current service date/time.
        visitStartTime:
          type: string
          pattern: "^([01]\\d|2[0-3]):[0-5]\\d$"
          description: Planned local visit start time in 24-hour `HH:mm` format. Requires `visitDate`; when omitted with `visitDate`, search evaluates opening hours at noon.
        origin:
          $ref: "#/components/schemas/Origin"
        location:
          $ref: "#/components/schemas/Origin"
          deprecated: true
          description: Backward-compatible alias for `origin`; prefer `origin` in new agent calls.
        radiusKm:
          type: number
          default: 80
          maximum: 200
        filterByRadius:
          type: boolean
          default: true
          description: When false, keep `origin` for distance calculation and scoring but do not restrict results to `radiusKm`. Useful for lodging/destination searches.
        minDistanceKm:
          type: number
          minimum: 0
          maximum: 500
          description: >-
            Hard lower distance bound from `origin`. Useful for outside-city or farther day-trip planning; requires `origin`.
        maxDistanceKm:
          type: number
          minimum: 0
          exclusiveMinimum: true
          maximum: 500
          description: >-
            Hard upper distance bound from `origin`. Use with `filterByRadius: false` when this explicit band should replace the default radius filter; requires `origin`.
        diversity:
          type: object
          description: Optional post-ranking caps that keep agent planning results from over-concentrating in one region or category.
          properties:
            maxPerRegion:
              type: integer
              minimum: 1
              maximum: 20
              description: Maximum number of results per `regionSido` + `regionSigungu` group before pagination.
            maxPerCategory:
              type: integer
              minimum: 1
              maximum: 20
              description: Maximum number of results per primary category before pagination.
        query:
          type: string
        matchMode:
          type: string
          enum: [keyword, exactName]
          default: keyword
          description: Use `exactName` for deterministic place-name lookup; it matches exact or whitespace-compacted place names instead of broad keyword/tag text.
        primaryCategories:
          type: array
          items:
            type: string
        playgroundOnly:
          type: boolean
          description: >-
            When true, restrict playground-style searches to indoor playgrounds or park records with playground evidence such as play-equipment tags, playground-like names, or positive place-level playFeatures.
        kidsCafeOnly:
          type: boolean
          description: >-
            When true, restrict kids-cafe searches to commercial/private play-cafe records, including legacy indoor_playground rows with source or tag evidence such as kids-cafe names, brand/operator tags, party-room/cafe signals, or paid commercial play branding.
        tags:
          type: array
          description: Soft matching signal. Tags do not exclude candidates.
          items:
            type: string
        childAgeMonths:
          type: array
          description: Soft matching signal. Age mismatch does not exclude candidates.
          items:
            type: integer
            minimum: 0
            maximum: 240
        childAgesMonths:
          type: array
          deprecated: true
          description: Backward-compatible alias for `childAgeMonths`; prefer `childAgeMonths`.
          items:
            type: integer
            minimum: 0
            maximum: 240
        preferences:
          type: object
          description: >-
            Search filter preference signals for high-value parent decisions. Defaults to soft ranking; set `preferenceMode: required` to exclude unknown or mismatched facility values.
          properties:
            indoorTypes:
              type: array
              items:
                $ref: "#/components/schemas/IndoorType"
            parkingAvailable:
              type: boolean
            strollerFriendly:
              type: boolean
            nursingRoom:
              type: boolean
            kidsToilet:
              type: boolean
            babyChair:
              type: boolean
        preferenceMode:
          type: string
          enum: [soft, required]
          default: soft
          description: Controls whether `preferences` are soft ranking signals or required filters. In `required` mode, positive search filter preferences require `yes` or `partial` evidence and indoorTypes must match.
        sort:
          type: string
          enum: [recommended, distance, updatedAt]
          default: recommended
        projection:
          type: string
          enum: [full, compact]
          default: full
          description: Use `compact` to return lightweight search items for planning and agent calls. Default `full` preserves the complete card/detail-oriented item shape.
        coursePlan:
          type: boolean
          default: false
          description: When true, include a lightweight role-based itinerary/course plan in response meta using the ranked result set.
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
        offset:
          type: integer
          minimum: 0
          maximum: 1000
          default: 0
    PlaceImageInput:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
        sourceId:
          type: string
          format: uuid
          description: Optional existing source row id. Prefer sourceUrl/sourceType when the source row is being appended in the same request.
        sourceUrl:
          type: string
          format: uri
        sourceType:
          $ref: "#/components/schemas/SourceType"
        sourceTitle:
          type: string
        creditText:
          type: string
          maxLength: 500
        altText:
          type: string
          maxLength: 500
        description:
          type: string
          maxLength: 4000
          description: Visual audit description written by an agent or human after inspecting the image.
        visualFeatures:
          type: array
          maxItems: 40
          items:
            type: string
          description: Machine-friendly visual tags such as slide, swing, sand_play, ball_pool, stroller_path, shade, water_edge.
        childSignals:
          type: object
          additionalProperties: true
          description: 'Structured observations inferred from the image, for example `{ "slide": true, "swing": false }`.'
        displayTier:
          type: string
          enum: [official, public_agency, public_listing, rights_unclear, unknown]
        status:
          type: string
          enum: [active, archived]
        reviewStatus:
          type: string
          enum: [pending_review, approved, needs_review, rejected]
        isPrimary:
          type: boolean
        sortOrder:
          type: integer
          minimum: 0
          maximum: 1000
        width:
          type: integer
        height:
          type: integer
        checkedAt:
          type: string
          format: date-time
    PlaceImage:
      type: object
