        - peakParkingWindow
        - parkingWaitNote
        - nursingRoom
        - diaperChangingTable
        - kidsToilet
        - elevator
        - babyChair
        - foodAllowed
      properties:
        indoorType:
          $ref: "#/components/schemas/IndoorType"
        strollerFriendly:
          $ref: "#/components/schemas/TriState"
        parkingAvailable:
          $ref: "#/components/schemas/TriState"
        parkingFrictionLevel:
          $ref: "#/components/schemas/ParkingFrictionLevel"
        peakParkingWindow:
          type: string
          nullable: true
        parkingWaitNote:
          type: string
          nullable: true
        nursingRoom:
          $ref: "#/components/schemas/TriState"
        diaperChangingTable:
          $ref: "#/components/schemas/TriState"
        kidsToilet:
          $ref: "#/components/schemas/TriState"
        elevator:
          $ref: "#/components/schemas/TriState"
        babyChair:
          $ref: "#/components/schemas/TriState"
        foodAllowed:
          $ref: "#/components/schemas/TriState"
    VisitSignals:
      type: object
