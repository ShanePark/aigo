openapi: 3.1.0
info:
  title: AiGo Agent-Friendly Places API
  version: 0.1.0
  description: |
    AiGo MVP API for external agents that collect, compare, create, update,
    search, and inspect kid-friendly place data. Natural-language parsing is
    intentionally outside this API; agents should send structured JSON.
servers:
  - url: http://localhost:3000
security:
  - bearerApiKey: []
paths:
  /v1/places/search:
    post:
      summary: Search places with soft matching
      operationId: searchPlaces
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchPlacesRequest"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchPlacesResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/places/duplicates:
    post:
      summary: Find possible duplicate places before create or update
      operationId: findDuplicatePlaces
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DuplicatePlaceRequest"
      responses:
        "200":
          description: Duplicate candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicatePlaceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/places/image-health:
    get:
      summary: List image coverage and review queues for place data agents
      operationId: listPlaceImageHealth
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [attention, no_active_image, rejected_only, needs_review, pending_review, no_primary, healthy, all]
            default: attention
          description: Queue selector. `attention` returns everything except healthy rows.
        - name: primaryCategory
          in: query
          required: false
          schema:
            type: string
          description: Optional primary category filter such as `family_restaurant` or `park`.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 5000
            default: 0
      responses:
        "200":
          description: Image health queue rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceImageHealthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/places:
    post:
      summary: Create a place and publish it immediately
      operationId: createPlace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlaceRequest"
      responses:
        "201":
          description: Created place detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/places/{placeId}:
    get:
      summary: Get place detail
      operationId: getPlace
      parameters:
        - $ref: "#/components/parameters/PlaceId"
      responses:
        "200":
          description: Place detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      summary: Update a place and append a wiki-style version
      operationId: updatePlace
      parameters:
        - $ref: "#/components/parameters/PlaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlaceRequest"
      responses:
        "200":
          description: Updated place detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete a place
      description: Hard-deletes the place and cascades its sources, images, and version history. Use only for deliberate audit cleanup or explicit user removal requests.
      operationId: deletePlace
      parameters:
        - $ref: "#/components/parameters/PlaceId"
      responses:
        "200":
          description: Deleted place summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePlaceResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/places/{placeId}/versions:
    get:
      summary: List place versions
      operationId: listPlaceVersions
      parameters:
        - $ref: "#/components/parameters/PlaceId"
      responses:
        "200":
          description: Version list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/PlaceVersionSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/places/{placeId}/versions/{versionId}:
    get:
      summary: Get a specific place version
      operationId: getPlaceVersion
      parameters:
        - $ref: "#/components/parameters/PlaceId"
        - name: versionId
          in: path
          required: true
          schema:
            type: string
          description: Version UUID or version number.
      responses:
        "200":
          description: Version detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceVersion"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  securitySchemes:
    bearerApiKey:
      type: http
      scheme: bearer
      bearerFormat: AIGO_API_KEY
  parameters:
    PlaceId:
      name: placeId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
        details: {}
    Origin:
      type: object
      required: [lat, lng]
      properties:
        lat:
          type: number
          minimum: -90
          maximum: 90
        lng:
          type: number
          minimum: -180
          maximum: 180
        label:
          type: string
    TriState:
      type: string
      enum: [yes, no, partial, unknown]
    IndoorType:
      type: string
      enum: [indoor, outdoor, mixed, unknown]
    RelatedPlaceRelationType:
      type: string
      enum: [nearby, same_building, same_site, parent_child, route_pair]
      description: Agent-maintained relationship between two registered places. Relations are stored once and returned bidirectionally.
    SourceInput:
      type: object
      required: [sourceType]
      properties:
        sourceType:
          type: string
        title:
          type: string
        url:
          type: string
          format: uri
        externalId:
          type: string
        summary:
          type: string
          maxLength: 2000
        checkedAt:
          type: string
          format: date-time
      anyOf:
        - required: [url]
        - required: [externalId]
    RelatedPlaceInput:
      type: object
      required: [placeId]
      properties:
        placeId:
          type: string
          format: uuid
        relationType:
          $ref: "#/components/schemas/RelatedPlaceRelationType"
          default: nearby
        note:
          type: string
          maxLength: 1000
        evidence:
          type: object
          description: Agent-maintained relation evidence such as distance meters, address match, source URLs, or audit batch id.
          additionalProperties: true
    PlaceWritableFields:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        primaryCategory:
          type: string
          description: Primary place category, such as kids_cafe, toy_store, park, shopping_mall, rest_area, or accommodation.
        tags:
          type: array
          items:
            type: string
          maxItems: 50
        description:
          type: string
        address:
          type: string
        roadAddress:
          type: string
        regionSido:
          type: string
        regionSigungu:
          type: string
        regionDong:
          type: string
        lat:
          type: number
          minimum: -90
          maximum: 90
        lng:
          type: number
          minimum: -180
          maximum: 180
        phone:
          type: string
        officialUrl:
          type: string
          format: uri
        reservationUrl:
          type: string
          format: uri
        kakaoPlaceUrl:
          type: string
          format: uri
        kakaoPlaceId:
          type: string
        externalRefs:
          type: object
          description: Optional external reference object used for JSON containment duplicate matching against stored `externalRefs`. Agents may store public parent-inspection links such as `reviewLinks` here.
          additionalProperties: true
        playFeatures:
          $ref: "#/components/schemas/PlayFeatures"
        imageUrls:
          type: array
          deprecated: true
          description: Backward-compatible shorthand. New agents should use `images`; these URLs are translated into `place_images` records.
          items:
            type: string
            format: uri
        images:
          type: array
          description: First-class image records attached to the place. Use this for audited image links, visual descriptions, and primary-image selection.
          maxItems: 30
          items:
            $ref: "#/components/schemas/PlaceImageInput"
        relatedPlaces:
          type: array
          description: Existing places that should be shown as related to this place, usually because they share a building, campus, resort, mall, or very close practical visit context.
          maxItems: 50
          items:
            $ref: "#/components/schemas/RelatedPlaceInput"
        status:
          type: string
          enum: [active, temporarily_closed, closed, draft, needs_review]
        dataConfidence:
          type: string
          enum: [official_verified, operator_curated, agent_collected, user_reported, needs_check, unknown]
        placeScore:
          type: number
          minimum: 0
          maximum: 10
          description: Source-backed objective 0-10 place score assigned by agents for the family outing use case. This is not an AiGo user rating.
        placeScoreRationale:
          type: string
          description: Concise agent-written rationale for the objective place score.
        externalRatingScore:
          type: number
          minimum: 0
          maximum: 10
          description: Normalized 0-10 third-party review/rating signal when citeable evidence exists.
        externalReviewCount:
          type: integer
          minimum: 0
          description: Approximate source-backed external review count used to weight rating confidence.
        searchEvidenceScore:
          type: number
          minimum: 0
          maximum: 10
          description: Normalized 0-10 evidence/prominence score derived from public search results, listings, official pages, and corroborating sources.
        scoreSignals:
          type: object
          description: Structured source-backed scoring evidence, such as provider ratings, search-result observations, caps, conflicts, and freshness notes.
          additionalProperties: true
        scoreUpdatedAt:
          type: string
          format: date-time
          description: Timestamp when the score fields were last reviewed or recomputed.
        minRecommendedAgeMonths:
          type: integer
          minimum: 0
          maximum: 240
        maxRecommendedAgeMonths:
          type: integer
          minimum: 0
          maximum: 240
        indoorType:
          $ref: "#/components/schemas/IndoorType"
        strollerFriendly:
          $ref: "#/components/schemas/TriState"
        parkingAvailable:
          $ref: "#/components/schemas/TriState"
        nursingRoom:
          $ref: "#/components/schemas/TriState"
        diaperChangingTable:
          $ref: "#/components/schemas/TriState"
        kidsToilet:
          $ref: "#/components/schemas/TriState"
        elevator:
          $ref: "#/components/schemas/TriState"
        babyChair:
          $ref: "#/components/schemas/TriState"
        foodAllowed:
          $ref: "#/components/schemas/TriState"
        averageStayMinutes:
          type: integer
        parentEffortLevel:
          type: integer
          minimum: 1
          maximum: 5
        childEngagementLevel:
          type: integer
          minimum: 1
          maximum: 5
        rainyDayScore:
          type: integer
          minimum: 1
          maximum: 5
        hotDayScore:
          type: integer
          minimum: 1
          maximum: 5
        coldDayScore:
          type: integer
          minimum: 1
          maximum: 5
        safetyNotes:
          type: string
        parentNotes:
          type: string
        openingHours: {}
    CreatePlaceRequest:
      allOf:
        - $ref: "#/components/schemas/PlaceWritableFields"
        - type: object
          required: [name, primaryCategory, lat, lng, sources]
          properties:
            sources:
              type: array
              minItems: 1
              items:
                $ref: "#/components/schemas/SourceInput"
            actor:
              type: string
              default: agent
            changeSummary:
              type: string
    UpdatePlaceRequest:
      allOf:
        - $ref: "#/components/schemas/PlaceWritableFields"
        - type: object
          required: [sources]
          properties:
            sources:
              type: array
              minItems: 1
              items:
                $ref: "#/components/schemas/SourceInput"
            sourceMode:
              type: string
              enum: [append, replace]
              default: append
              description: Append new provenance by default. Use replace only to correct a bad import or source contamination.
            imageMode:
              type: string
              enum: [append, replace]
              default: append
              description: Append image records by default. Use replace after manual visual audit to keep only meaningful active images.
            relatedPlaceMode:
              type: string
              enum: [append, replace]
              default: append
              description: Append related-place pairs by default. Use replace to rewrite this place's current relationship set.
            actor:
              type: string
              default: agent
            changeSummary:
              type: string
    SearchPlacesRequest:
      type: object
      properties:
        visitContext:
          type: string
          enum: [afterDaycare, nearbyNow, rainyDay, weekendHalfDay, dayTrip]
          description: Soft ranking context for common parent outing scenarios.
        origin:
          $ref: "#/components/schemas/Origin"
        location:
          $ref: "#/components/schemas/Origin"
          deprecated: true
          description: Backward-compatible alias for `origin`; prefer `origin` in new agent calls.
        radiusKm:
          type: number
          default: 80
          maximum: 200
        query:
          type: string
        primaryCategories:
          type: array
          items:
            type: string
        tags:
          type: array
          description: Soft matching signal. Tags do not exclude candidates.
          items:
            type: string
        childAgeMonths:
          type: array
          description: Soft matching signal. Age mismatch does not exclude candidates.
          items:
            type: integer
            minimum: 0
            maximum: 240
        childAgesMonths:
          type: array
          deprecated: true
          description: Backward-compatible alias for `childAgeMonths`; prefer `childAgeMonths`.
          items:
            type: integer
            minimum: 0
            maximum: 240
        preferences:
          type: object
          description: Soft matching signals. Facility mismatch does not exclude candidates.
          properties:
            indoorTypes:
              type: array
              items:
                $ref: "#/components/schemas/IndoorType"
            parkingAvailable:
              type: boolean
            strollerFriendly:
              type: boolean
            nursingRoom:
              type: boolean
            diaperChangingTable:
              type: boolean
            kidsToilet:
              type: boolean
            elevator:
              type: boolean
            babyChair:
              type: boolean
            foodAllowed:
              type: boolean
        sort:
          type: string
          enum: [recommended, distance, updatedAt]
          default: recommended
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
        offset:
          type: integer
          minimum: 0
          maximum: 1000
          default: 0
    PlaceImageInput:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
        sourceId:
          type: string
          format: uuid
          description: Optional existing source row id. Prefer sourceUrl/sourceType when the source row is being appended in the same request.
        sourceUrl:
          type: string
          format: uri
        sourceType:
          type: string
        sourceTitle:
          type: string
        creditText:
          type: string
          maxLength: 500
        altText:
          type: string
          maxLength: 500
        description:
          type: string
          maxLength: 4000
          description: Visual audit description written by an agent or human after inspecting the image.
        visualFeatures:
          type: array
          maxItems: 40
          items:
            type: string
          description: Machine-friendly visual tags such as slide, swing, sand_play, ball_pool, stroller_path, shade, water_edge.
        childSignals:
          type: object
          additionalProperties: true
          description: 'Structured observations inferred from the image, for example `{ "slide": true, "swing": false }`.'
        displayTier:
          type: string
          enum: [official, public_agency, public_listing, rights_unclear, unknown]
        status:
          type: string
          enum: [active, archived]
        reviewStatus:
          type: string
          enum: [pending_review, approved, needs_review, rejected]
        isPrimary:
          type: boolean
        sortOrder:
          type: integer
          minimum: 0
          maximum: 1000
        width:
          type: integer
        height:
          type: integer
        checkedAt:
          type: string
          format: date-time
    PlaceImage:
      type: object
      required:
        - id
        - placeId
        - url
        - sortOrder
        - isPrimary
        - sourceId
        - sourceUrl
        - sourceType
        - sourceTitle
        - displayTier
        - creditText
        - altText
        - description
        - visualFeatures
        - childSignals
        - width
        - height
        - checkedAt
        - status
        - reviewStatus
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        placeId:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        sortOrder:
          type: integer
          minimum: 0
        isPrimary:
          type: boolean
        sourceId:
          type: string
          format: uuid
          nullable: true
        sourceUrl:
          type: string
          format: uri
          nullable: true
        sourceType:
          type: string
          nullable: true
        sourceTitle:
          type: string
          nullable: true
        displayTier:
          type: string
          description: Coarse provenance tier for UI and agent trust decisions.
          enum: [official, public_agency, public_listing, rights_unclear, unknown]
        creditText:
          type: string
        altText:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        visualFeatures:
          type: array
          items:
            type: string
        childSignals:
          type: object
          additionalProperties: true
        width:
          type: integer
          nullable: true
        height:
          type: integer
          nullable: true
        checkedAt:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [active, archived]
        reviewStatus:
          type: string
          enum: [pending_review, approved, needs_review, rejected]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    RelatedPlace:
      type: object
      required:
        - relationId
        - placeId
        - name
        - primaryCategory
        - tags
        - address
        - roadAddress
        - lat
        - lng
        - status
        - relationType
        - note
        - evidence
        - distanceMeters
        - createdAt
        - updatedAt
      properties:
        relationId:
          type: string
          format: uuid
        placeId:
          type: string
          format: uuid
        name:
          type: string
        primaryCategory:
          type: string
        tags:
          type: array
          items:
            type: string
        address:
          type: string
          nullable: true
        roadAddress:
          type: string
          nullable: true
        lat:
          type: number
        lng:
          type: number
        status:
          type: string
        relationType:
          $ref: "#/components/schemas/RelatedPlaceRelationType"
        note:
          type: string
          nullable: true
        evidence:
          type: object
          additionalProperties: true
        distanceMeters:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PlaceImageHealthResponse:
      type: object
      required: [items, meta]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PlaceImageHealthItem"
        meta:
          type: object
          required: [count, total, limit, offset, status, primaryCategory]
          properties:
            count:
              type: integer
            total:
              type: integer
            limit:
              type: integer
            offset:
              type: integer
            status:
              type: string
              enum: [attention, no_active_image, rejected_only, needs_review, pending_review, no_primary, healthy, all]
            primaryCategory:
              type:
                - string
                - "null"
    PlaceImageHealthItem:
      type: object
      required:
        - placeId
        - name
        - primaryCategory
        - tags
        - region
        - dataConfidence
        - updatedAt
        - imageHealth
      properties:
        placeId:
          type: string
          format: uuid
        name:
          type: string
        primaryCategory:
          type: string
        tags:
          type: array
          items:
            type: string
        address:
          type: string
          nullable: true
        roadAddress:
          type: string
          nullable: true
        region:
          type: object
          required: [sido, sigungu, dong]
          properties:
            sido:
              type: string
              nullable: true
            sigungu:
              type: string
              nullable: true
            dong:
              type: string
              nullable: true
        dataConfidence:
          type: string
        updatedAt:
          type: string
          format: date-time
        imageHealth:
          type: object
          required:
            - status
            - suggestedAction
            - priorityScore
            - activeCount
            - approvedCount
            - needsReviewCount
            - pendingReviewCount
            - rejectedCount
            - archivedCount
            - hasPrimary
            - primaryImageUrl
            - primaryReviewStatus
            - latestImageCheckedAt
            - latestImageUpdatedAt
          properties:
            status:
              type: string
              enum: [no_active_image, rejected_only, needs_review, pending_review, no_primary, healthy]
            suggestedAction:
              type: string
              enum: [find_replacement_image, find_first_image, choose_primary_image, review_or_replace_images, audit_pending_images, none]
            priorityScore:
              type: integer
            activeCount:
              type: integer
            approvedCount:
              type: integer
            needsReviewCount:
              type: integer
            pendingReviewCount:
              type: integer
            rejectedCount:
              type: integer
            archivedCount:
              type: integer
            hasPrimary:
              type: boolean
            primaryImageUrl:
              type:
                - string
                - "null"
              format: uri
            primaryReviewStatus:
              type:
                - string
                - "null"
            latestImageCheckedAt:
              type:
                - string
                - "null"
              format: date-time
            latestImageUpdatedAt:
              type:
                - string
                - "null"
              format: date-time
    SearchPlaceItem:
      type: object
      required:
        - placeId
        - name
        - primaryCategory
        - tags
        - description
        - imageUrls
        - primaryImage
        - images
        - playFeatures
        - score
        - scoreBreakdown
        - reasonCodes
        - reasons
        - dataConfidence
        - scoring
        - recommendedAgeMonths
        - facilities
        - visit
        - notes
        - version
        - updatedAt
      properties:
        placeId:
          type: string
          format: uuid
        name:
          type: string
        primaryCategory:
          type: string
        tags:
          type: array
          items:
            type: string
        address:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        imageUrls:
          type: array
          deprecated: true
          description: Backward-compatible URL list derived from active `place_images`.
          items:
            type: string
            format: uri
        primaryImage:
          anyOf:
            - $ref: "#/components/schemas/PlaceImage"
            - type: "null"
        images:
          type: array
          description: First-class image entities, ordered by primary image and sort order.
          items:
            $ref: "#/components/schemas/PlaceImage"
        playFeatures:
          $ref: "#/components/schemas/PlayFeatures"
        lat:
          type: number
        lng:
          type: number
        distanceKm:
          type: number
          nullable: true
        score:
          type: integer
          minimum: 0
          maximum: 100
        scoreBreakdown:
          $ref: "#/components/schemas/ScoreBreakdown"
        reasonCodes:
          type: array
          items:
            type: string
        reasons:
          type: array
          description: Structured reason metadata sorted by display priority. `reasonCodes` is kept for machine compatibility.
          items:
            $ref: "#/components/schemas/SearchReason"
        dataConfidence:
          type: string
        scoring:
          $ref: "#/components/schemas/PlaceScoring"
        recommendedAgeMonths:
          $ref: "#/components/schemas/RecommendedAgeMonths"
        facilities:
          $ref: "#/components/schemas/Facilities"
        visit:
          $ref: "#/components/schemas/VisitSignals"
        notes:
          $ref: "#/components/schemas/PlaceNotes"
        version:
          type: integer
        updatedAt:
          type: string
          format: date-time
    SearchReason:
      type: object
      required: [code, labelKo, group, tone, priority]
      properties:
        code:
          type: string
        labelKo:
          type: string
        group:
          type: string
          enum: [preference, age, distance, context, match, confidence, other]
        tone:
          type: string
          enum: [positive, partial, negative, unknown, neutral]
        priority:
          type: integer
    SearchPlacesResponse:
      type: object
      required: [items, meta]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SearchPlaceItem"
        meta:
          type: object
          required: [count, total, limit, offset, origin, search]
          properties:
            count:
              type: integer
            total:
              type: integer
            limit:
              type: integer
            offset:
              type: integer
            origin:
              anyOf:
                - $ref: "#/components/schemas/Origin"
                - type: "null"
            search:
              type: object
              required: [originalQuery, normalizedQuery, appliedPreferences, visitContext, normalized]
              description: Query normalization details for agent debugging and zero-result recovery.
              properties:
                originalQuery:
                  type:
                    - string
                    - "null"
                normalizedQuery:
                  type:
                    - string
                    - "null"
                appliedPreferences:
                  anyOf:
                    - type: object
                      additionalProperties: true
                    - type: "null"
                visitContext:
                  type:
                    - string
                    - "null"
                  enum: [afterDaycare, nearbyNow, rainyDay, weekendHalfDay, dayTrip, null]
                normalized:
                  type: boolean
    DuplicatePlaceRequest:
      type: object
      required: [name, lat, lng]
      properties:
        name:
          type: string
        lat:
          type: number
        lng:
          type: number
        radiusMeters:
          type: number
          default: 500
          maximum: 5000
        kakaoPlaceId:
          type: string
        externalRefs:
          type: object
          description: Optional external reference object used for JSON containment duplicate matching against stored `externalRefs`. Agents may store public parent-inspection links such as `reviewLinks` here.
          additionalProperties: true
        limit:
          type: integer
          default: 10
          maximum: 20
    DuplicatePlaceResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            required: [place, confidence, reasonCodes, distanceMeters, nameSimilarity]
            properties:
              place:
                $ref: "#/components/schemas/PlaceDetail"
              confidence:
                type: string
                enum: [high, medium, low]
              reasonCodes:
                type: array
                items:
                  type: string
              distanceMeters:
                type: number
                nullable: true
              nameSimilarity:
                type: number
                nullable: true
    RecommendedAgeMonths:
      type: object
      required: [min, max]
      properties:
        min:
          type: integer
          nullable: true
        max:
          type: integer
          nullable: true
    PlaceScoring:
      type: object
      required:
        - placeScore
        - placeScoreRationale
        - externalRatingScore
        - externalReviewCount
        - searchEvidenceScore
        - scoreSignals
        - scoreUpdatedAt
      properties:
        placeScore:
          type: number
          minimum: 0
          maximum: 10
          nullable: true
        placeScoreRationale:
          type: string
          nullable: true
        externalRatingScore:
          type: number
          minimum: 0
          maximum: 10
          nullable: true
        externalReviewCount:
          type: integer
          minimum: 0
          nullable: true
        searchEvidenceScore:
          type: number
          minimum: 0
          maximum: 10
          nullable: true
        scoreSignals:
          type: object
          additionalProperties: true
        scoreUpdatedAt:
          type: string
          format: date-time
          nullable: true
    ScoreBreakdown:
      type: object
      required:
        - baseline
        - placeQuality
        - externalEvidence
        - distance
        - context
        - match
        - age
        - preferences
        - openingHours
        - visitFit
        - confidence
        - queryMatch
        - total
      properties:
        baseline:
          type: number
        placeQuality:
          type: number
        externalEvidence:
          type: number
        distance:
          type: number
        context:
          type: number
        match:
          type: number
        age:
          type: number
        preferences:
          type: number
        openingHours:
          type: number
        visitFit:
          type: number
        confidence:
          type: number
        queryMatch:
          type: number
        total:
          type: integer
          minimum: 0
          maximum: 100
    PlayFeatures:
      type: object
      description: Place-level playground and physical play signals. These describe the place as a whole; image-level `visualFeatures` only describe what was visible in one image.
      properties:
        slide:
          $ref: "#/components/schemas/TriState"
        swing:
          $ref: "#/components/schemas/TriState"
        babySwing:
          $ref: "#/components/schemas/TriState"
        waterPlayground:
          $ref: "#/components/schemas/TriState"
        sandPlay:
          $ref: "#/components/schemas/TriState"
        climbing:
          $ref: "#/components/schemas/TriState"
        seesaw:
          $ref: "#/components/schemas/TriState"
        trampoline:
          $ref: "#/components/schemas/TriState"
        rideOnToys:
          $ref: "#/components/schemas/TriState"
        playHouse:
          $ref: "#/components/schemas/TriState"
        openLawn:
          $ref: "#/components/schemas/TriState"
        shade:
          $ref: "#/components/schemas/TriState"
        fenced:
          $ref: "#/components/schemas/TriState"
        rubberSurface:
          $ref: "#/components/schemas/TriState"
        strollerPath:
          $ref: "#/components/schemas/TriState"
        toiletNearby:
          $ref: "#/components/schemas/TriState"
        notes:
          type: string
          description: Short source-backed notes for equipment, layout, or open questions.
        evidence:
          type: array
          description: Evidence items that explain why a feature value is present. Field-level provenance is still out of MVP scope, but agents can use this for practical traceability.
          items:
            type: object
            required: [feature]
            properties:
              feature:
                type: string
              value:
                $ref: "#/components/schemas/TriState"
              basis:
                type: string
              sourceUrl:
                type: string
                format: uri
              confidence:
                type: string
                enum: [official, visual_confirmed, user_reported, blog_supported, needs_check, unknown]
      additionalProperties: true
    Facilities:
      type: object
      required:
        - indoorType
        - strollerFriendly
        - parkingAvailable
        - nursingRoom
        - diaperChangingTable
        - kidsToilet
        - elevator
        - babyChair
        - foodAllowed
      properties:
        indoorType:
          $ref: "#/components/schemas/IndoorType"
        strollerFriendly:
          $ref: "#/components/schemas/TriState"
        parkingAvailable:
          $ref: "#/components/schemas/TriState"
        nursingRoom:
          $ref: "#/components/schemas/TriState"
        diaperChangingTable:
          $ref: "#/components/schemas/TriState"
        kidsToilet:
          $ref: "#/components/schemas/TriState"
        elevator:
          $ref: "#/components/schemas/TriState"
        babyChair:
          $ref: "#/components/schemas/TriState"
        foodAllowed:
          $ref: "#/components/schemas/TriState"
    VisitSignals:
      type: object
      required:
        - averageStayMinutes
        - parentEffortLevel
        - childEngagementLevel
        - rainyDayScore
        - hotDayScore
        - coldDayScore
      properties:
        averageStayMinutes:
          type: integer
          nullable: true
        parentEffortLevel:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5
        childEngagementLevel:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5
        rainyDayScore:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5
        hotDayScore:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5
        coldDayScore:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5
    PlaceNotes:
      type: object
      required: [safety, parent]
      properties:
        safety:
          type: string
          nullable: true
        parent:
          type: string
          nullable: true
    Source:
      allOf:
        - $ref: "#/components/schemas/SourceInput"
        - type: object
          required: [id, sourceType, checkedAt, createdAt]
          properties:
            id:
              type: string
              format: uuid
            checkedAt:
              type: string
              format: date-time
              nullable: true
            createdAt:
              type: string
              format: date-time
    PlaceVersionSummary:
      type: object
      required: [id, versionNumber, action, actor, createdAt]
      properties:
        id:
          type: string
          format: uuid
        versionNumber:
          type: integer
        action:
          type: string
          enum: [create, update]
        actor:
          type: string
        changeSummary:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    DeletePlaceResponse:
      type: object
      required: [id, name, deleted]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        deleted:
          type: boolean
    PlaceVersion:
      allOf:
        - $ref: "#/components/schemas/PlaceVersionSummary"
        - type: object
          required: [snapshot, sources]
          properties:
            snapshot:
              type: object
              additionalProperties: true
            sources:
              type: array
              items:
                $ref: "#/components/schemas/SourceInput"
    PlaceDetail:
      type: object
      required:
        - id
        - name
        - primaryCategory
        - tags
        - region
        - lat
        - lng
        - contact
        - externalRefs
        - imageUrls
        - primaryImage
        - images
        - relatedPlaces
        - playFeatures
        - status
        - dataConfidence
        - scoring
        - recommendedAgeMonths
        - facilities
        - visit
        - notes
        - version
        - createdAt
        - updatedAt
        - sources
        - versions
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
          nullable: true
        primaryCategory:
          type: string
        tags:
          type: array
          items:
            type: string
        description:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        roadAddress:
          type: string
          nullable: true
        region:
          type: object
          required: [sido, sigungu, dong]
          properties:
            sido:
              type: string
              nullable: true
            sigungu:
              type: string
              nullable: true
            dong:
              type: string
              nullable: true
        lat:
          type: number
        lng:
          type: number
        contact:
          type: object
          properties:
            phone:
              type: string
              nullable: true
            officialUrl:
              type: string
              nullable: true
            reservationUrl:
              type: string
              nullable: true
            kakaoPlaceUrl:
              type: string
              nullable: true
            kakaoPlaceId:
              type: string
              nullable: true
        externalRefs:
          type: object
          description: External references and agent-maintained link collections, including optional `reviewLinks` for public review/listing/search pages.
          additionalProperties: true
        imageUrls:
          type: array
          deprecated: true
          description: Backward-compatible URL list derived from active `place_images`.
          items:
            type: string
            format: uri
        primaryImage:
          anyOf:
            - $ref: "#/components/schemas/PlaceImage"
            - type: "null"
        images:
          type: array
          description: First-class image entities, ordered by primary image and sort order.
          items:
            $ref: "#/components/schemas/PlaceImage"
        relatedPlaces:
          type: array
          description: Bidirectional related-place summaries for nearby/same-building/same-site browsing.
          items:
            $ref: "#/components/schemas/RelatedPlace"
        playFeatures:
          $ref: "#/components/schemas/PlayFeatures"
        status:
          type: string
        dataConfidence:
          type: string
        scoring:
          $ref: "#/components/schemas/PlaceScoring"
        recommendedAgeMonths:
          $ref: "#/components/schemas/RecommendedAgeMonths"
        facilities:
          $ref: "#/components/schemas/Facilities"
        visit:
          $ref: "#/components/schemas/VisitSignals"
        notes:
          $ref: "#/components/schemas/PlaceNotes"
        openingHours: {}
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastVerifiedAt:
          type: string
          format: date-time
          nullable: true
        sources:
          type: array
          items:
            $ref: "#/components/schemas/Source"
        versions:
          type: array
          items:
            $ref: "#/components/schemas/PlaceVersionSummary"
