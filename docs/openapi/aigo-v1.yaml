openapi: 3.1.0
info:
  title: AiGo Agent-Friendly Places API
  version: 0.1.0
  description: |
    AiGo MVP API for external agents that collect, compare, create, update,
    search, and inspect kid-friendly place data. Natural-language parsing is
    intentionally outside this API; agents should send structured JSON.
servers:
  - url: https://aigo.o-r.kr
  - url: http://localhost:3000
security:
  - bearerApiKey: []
paths:
  /v1/health:
    get:
      summary: Check agent API health and bearer key validity
      operationId: getAgentHealth
      description: >-
        Lightweight readiness check for agent workflows. Requires the same bearer API key
        as other `/v1` routes, performs a shallow database query, and rate-limits repeated
        invalid-key attempts from the same client for a short block window.
      responses:
        "200":
          description: API key is valid and the database is reachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                ok:
                  value:
                    ok: true
                    service: aigo-api
                    auth: ok
                    database: ok
                    checkedAt: "2026-05-27T00:00:00.000Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/places/search:
    post:
      summary: Search places with soft matching
      operationId: searchPlaces
      description: >-
        Returns the current search shape as top-level `items` plus `meta`. Agent scripts
        should not read a `results` array from current responses; use the shared read-only
        helper in `scripts/lib/aigo-search.ts` when handling cached legacy fixtures.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchPlacesRequest"
            examples:
              compactExactName:
                summary: Compact exact-name lookup
                value:
                  query: 국립광주과학관
                  matchMode: exactName
                  projection: compact
                  limit: 5
      responses:
        "200":
          description: Search results with top-level `items` and `meta`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchPlacesResponse"
              examples:
                compactExactName:
                  summary: Compact exact-name response shape
                  value:
                    items:
                      - id: e37846ac-015e-424c-83e9-e6cf2990d65a
                        name: 국립광주과학관
                        primaryCategory: science_museum
                        tags: []
                        address: 광주광역시 북구 첨단과기로 235
                        lat: 35.2296
                        lng: 126.8494
                        distanceKm: null
                        score: 80
                        reasonCodes: [QUERY_NAME_EXACT]
                        reasons: []
                        dataConfidence: agent_collected
                        taxonomy:
                          schemaVersion: 1
                          sourceBacked:
                            familyFitGates: []
                            activityTypes: []
                            visitUseCases: []
                            ageBands: []
                            accessTags: []
                            logisticsTags: []
                            riskTags: []
                          inferred:
                            familyFitGates: []
                            activityTypes: []
                            visitUseCases: []
                            ageBands: []
                            accessTags: []
                            logisticsTags: []
                            riskTags: []
                          migration:
                            legacyTags: []
                            broadMappedTags: []
                            unmappedTags: []
                        pricing: {}
                        routeSupport: {}
                        recommendedAgeMonths:
                          min: null
                          max: null
                        infantLogistics:
                          supportLevel: unknown
                          supportScore: 0
                          evidence: []
                          gaps: []
                        structuredDataGaps: []
                        openingHoursSummary:
                          status: unknown
                          label: 운영시간 미확인
                          confidence: unknown
                          nextChangeAt: null
                          notes: []
                          sourceCheckedAt: null
                        facilities:
                          indoorType: unknown
                          strollerFriendly: unknown
                          parkingAvailable: unknown
                          parkingFrictionLevel: unknown
                          peakParkingWindow: null
                          parkingWaitNote: null
                          nursingRoom: unknown
                          diaperChangingTable: unknown
                          kidsToilet: unknown
                          elevator: unknown
                          babyChair: unknown
                          foodAllowed: unknown
                        visit:
                          reservationRequired: unknown
                          walkInAvailable: unknown
                          sessionBased: unknown
                          sameDayAvailabilityKnown: unknown
                          averageStayMinutes: null
                          parentEffortLevel: null
                          childEngagementLevel: null
                        notes:
                          safety: null
                          parent: null
                        primaryImageUrl: null
                        imageHealth:
                          status: no_active_image
                          activeCount: 0
                          approvedCount: 0
                          needsReviewCount: 0
                          pendingReviewCount: 0
                          primaryImageUrl: null
                          primaryReviewStatus: null
                          latestCheckedAt: null
                          latestUpdatedAt: null
                        sourceSummary:
                          sourceCount: 0
                          sourceTypes: []
                          bestSourceType: null
                          bestSourceTier: none
                          latestCheckedAt: null
                          freshnessStatus: unchecked
                    meta:
                      count: 1
                      total: 1
                      limit: 5
                      offset: 0
                      projection: compact
                      origin: null
                      coursePlan: null
                      search:
                        originalQuery: 국립광주과학관
                        normalizedQuery: 국립광주과학관
                        appliedPreferences: null
                        preferenceSemantics: []
                        visitContext: null
                        normalized: false
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/places/duplicates:
    post:
      summary: Find possible duplicate places before create or update
      operationId: findDuplicatePlaces
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DuplicatePlaceRequest"
      responses:
        "200":
          description: Duplicate candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicatePlaceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/places/image-health:
    get:
      summary: List image coverage and review queues for place data agents
      operationId: listPlaceImageHealth
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [attention, no_active_image, rejected_only, needs_review, pending_review, no_primary, healthy, primary_image_unreachable, all]
            default: attention
          description: Queue selector. `attention` returns everything except healthy rows.
        - name: probeImages
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: When true, scoped `placeIds` lookups re-probe primary image URLs with HEAD followed by ranged GET and can return `primary_image_unreachable`. Requires 25 or fewer `placeIds`; unscoped queue scans do not perform external image probes.
        - name: primaryCategory
          in: query
          required: false
          schema:
            type: string
            minLength: 1
          description: Optional primary category filter such as `family_restaurant` or `park`.
        - name: placeIds
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated place UUIDs for narrowing the queue to current search or recommendation candidates. Explicitly scoped lookups include `temporarily_closed` records; the unscoped queue remains active-only.
        - name: placeId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Backward-compatible single-place alias for `placeIds`. If both `placeIds` and `placeId` are provided, `placeIds` is used.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 5000
            default: 0
      responses:
        "200":
          description: Image health queue rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceImageHealthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/places:
    post:
      summary: Create a place and publish it immediately
      operationId: createPlace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlaceRequest"
      responses:
        "201":
          description: Created place detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/places/{placeId}:
    get:
      summary: Get place detail
      operationId: getPlace
      parameters:
        - $ref: "#/components/parameters/PlaceId"
      responses:
        "200":
          description: Place detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      summary: Update a place and append a wiki-style version
      operationId: updatePlace
      parameters:
        - $ref: "#/components/parameters/PlaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlaceRequest"
      responses:
        "200":
          description: Updated place detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Soft-delete a place
      description: Marks the place `closed` so it is excluded from search while preserving sources, images, and version history. Requires an explicit confirmation payload with the current place name, source provenance, and change summary.
      operationId: deletePlace
      parameters:
        - $ref: "#/components/parameters/PlaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeletePlaceRequest"
      responses:
        "200":
          description: Deleted place summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeletePlaceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/places/{placeId}/retire-duplicate:
    post:
      summary: Retire an active duplicate place into a canonical place
      description: Marks the target place `merged`, preserves source-backed audit history, stores the canonical place id in `externalRefs.duplicateRetirement`, and excludes the retired duplicate from search and duplicate candidate results.
      operationId: retireDuplicatePlace
      parameters:
        - $ref: "#/components/parameters/PlaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetireDuplicatePlaceRequest"
      responses:
        "200":
          description: Retired duplicate summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetireDuplicatePlaceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/places/{placeId}/versions:
    get:
      summary: List place versions
      operationId: listPlaceVersions
      parameters:
        - $ref: "#/components/parameters/PlaceId"
      responses:
        "200":
          description: Version list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/PlaceVersionSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/places/{placeId}/versions/{versionId}:
    get:
      summary: Get a specific place version
      operationId: getPlaceVersion
      parameters:
        - $ref: "#/components/parameters/PlaceId"
        - name: versionId
          in: path
          required: true
          schema:
            type: string
          description: Version UUID or version number.
      responses:
        "200":
          description: Version detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceVersion"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  securitySchemes:
    bearerApiKey:
      type: http
      scheme: bearer
      bearerFormat: AIGO_API_KEY
  parameters:
    PlaceId:
      name: placeId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    TooManyRequests:
      description: Too many invalid API key attempts
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ServiceUnavailable:
      description: Server or database health check failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
        details: {}
    HealthResponse:
      type: object
      required: [ok, service, auth, database, checkedAt]
      properties:
        ok:
          type: boolean
          const: true
        service:
          type: string
          const: aigo-api
        auth:
          type: string
          const: ok
        database:
          type: string
          const: ok
        checkedAt:
          type: string
          format: date-time
    Origin:
      type: object
      required: [lat, lng]
      properties:
        lat:
          type: number
          minimum: -90
          maximum: 90
        lng:
          type: number
          minimum: -180
          maximum: 180
        label:
          type: string
    ViewportBounds:
      type: object
      required: [minLat, minLng, maxLat, maxLng]
      description: Visible map bounds used to restrict search candidates to the area currently shown to the user.
      properties:
        minLat:
          type: number
          minimum: -90
          maximum: 90
        minLng:
          type: number
          minimum: -180
          maximum: 180
        maxLat:
          type: number
          minimum: -90
          maximum: 90
        maxLng:
          type: number
          minimum: -180
          maximum: 180
    TriState:
      type: string
      enum: [yes, no, partial, unknown]
    IndoorType:
      type: string
      enum: [indoor, outdoor, mixed, unknown]
    ParkingFrictionLevel:
      type: string
      enum: [low, medium, high, unknown]
      description: Parent-facing parking difficulty signal; use unknown when source evidence is weak.
    PrimaryCategory:
      type: string
      enum:
        - kids_cafe
        - indoor_playground
        - toy_store
        - toy_library
        - shared_childcare
        - library
        - art_museum
        - museum
        - science_museum
        - experience_center
        - aquarium
        - park
        - playground
        - family_cafe
        - family_restaurant
        - sports_venue
        - shopping_mall
        - rest_area
        - accommodation
        - zoo
      description: Closed top-level place category set. Finer classification belongs in taxonomy facets.
    SourceType:
      type: string
      enum:
        - official_site
        - public_agency
        - public_tourism
        - operator_page
        - public_listing
        - public_news
        - public_blog
        - user_observation
        - agent_observation
        - official_image_source
        - public_listing_image_source
        - public_news_image_source
        - map_service
        - geocode
        - unknown
      description: Canonical source provenance type. Common aliases such as `official`, `official_page`, `news_article`, `blog`, `public_data_mirror`, and image-source variants are normalized by the API.
    TaxonomyFacetSet:
      type: object
      description: Controlled place taxonomy facet set. Canonical values are English snake_case slugs.
      properties:
        familyFitGates:
          type: array
          items:
            type: string
            enum: [child_primary, baby_logistics, retail_fallback, route_break, user_signal]
        activityTypes:
          type: array
          items:
            type: string
            enum: [indoor_play, outdoor_playground, water_play, sand_play, nature_walk, reading_books, toy_borrowing, shopping_browse, meal_play, science_exhibit, culture_exhibit, hands_on_experience, animals_aquarium, lodging_play]
        visitUseCases:
          type: array
          items:
            type: string
            enum: [after_daycare, nearby_now, rainy_day, weekend_half_day, day_trip, hot_day, cold_day]
        ageBands:
          type: array
          items:
            type: string
            enum: [infant, toddler, preschool, school_age]
        accessTags:
          type: array
          items:
            type: string
            enum: [public_facility]
        logisticsTags:
          type: array
          items:
            type: string
            enum: [parking, low_parking_friction, stroller, double_stroller, elevator, nursing_room, diaper_table, kids_toilet, baby_chair, food_support, reservation, session_based]
        riskTags:
          type: array
          items:
            type: string
            enum: [water_edge, road_nearby, steep_path, crowding, fire_grill, current_operation_uncertain, seasonal_operation, infant_amenity_gap]
    PlaceTaxonomy:
      type: object
      description: Source-backed and inferred controlled classification for parent-planning semantics. Use `sourceBacked` only for cited facts and `inferred` for agent-derived broad planning labels. Write requests may provide a fragment; omitted schemaVersion, facet arrays, and migration arrays default to taxonomy v1 empty values.
      properties:
        schemaVersion:
          type: integer
          enum: [1]
          default: 1
        sourceBacked:
          $ref: "#/components/schemas/TaxonomyFacetSet"
        inferred:
          allOf:
            - $ref: "#/components/schemas/TaxonomyFacetSet"
            - type: object
              properties:
                confidence:
                  type: string
                  enum: [high, medium, low]
                basis:
                  type: string
                  maxLength: 1000
        migration:
          type: object
          properties:
            legacyTags:
              type: array
              maxItems: 200
              items:
                type: string
            broadMappedTags:
              type: array
              maxItems: 200
              items:
                type: string
            unmappedTags:
              type: array
              maxItems: 200
              items:
                type: string
            normalizedAt:
              type: string
              format: date-time
    SearchTaxonomyRequest:
      type: object
      description: >-
        Controlled taxonomy facets for search. Defaults to soft ranking; use `mode: required`
        to require every requested facet in either `sourceBacked` or `inferred` taxonomy.
      properties:
        mode:
          type: string
          enum: [soft, required]
          default: soft
        familyFitGates:
          type: array
          maxItems: 20
          items:
            type: string
            enum: [child_primary, baby_logistics, retail_fallback, route_break, user_signal]
        activityTypes:
          type: array
          maxItems: 20
          items:
            type: string
            enum: [indoor_play, outdoor_playground, water_play, sand_play, nature_walk, reading_books, toy_borrowing, shopping_browse, meal_play, science_exhibit, culture_exhibit, hands_on_experience, animals_aquarium, lodging_play]
        visitUseCases:
          type: array
          maxItems: 20
          items:
            type: string
            enum: [after_daycare, nearby_now, rainy_day, weekend_half_day, day_trip, hot_day, cold_day]
        ageBands:
          type: array
          maxItems: 20
          items:
            type: string
            enum: [infant, toddler, preschool, school_age]
        accessTags:
          type: array
          maxItems: 20
          items:
            type: string
            enum: [public_facility]
        logisticsTags:
          type: array
          maxItems: 20
          items:
            type: string
            enum: [parking, low_parking_friction, stroller, double_stroller, elevator, nursing_room, diaper_table, kids_toilet, baby_chair, food_support, reservation, session_based]
        riskTags:
          type: array
          maxItems: 20
          items:
            type: string
            enum: [water_edge, road_nearby, steep_path, crowding, fire_grill, current_operation_uncertain, seasonal_operation, infant_amenity_gap]
    RelatedPlaceRelationType:
      type: string
      enum: [nearby, same_building, same_site, parent_child, route_pair, itinerary_cluster]
      description: Agent-maintained relationship between two registered places. Use same_site for shared campuses/resorts/facility grounds when hierarchy is loose, parent_child for explicit lodging/facility subvenues, and itinerary_cluster for day-trip clusters with shared drive burden, meal/rest fallback, and parent-effort evidence. Relations are stored once and returned bidirectionally.
    SourceInput:
      type: object
      required: [sourceType]
      properties:
        sourceType:
          $ref: "#/components/schemas/SourceType"
        title:
          type: string
        url:
          type: string
          format: uri
        externalId:
          type: string
        summary:
          type: string
          maxLength: 2000
        checkedAt:
          type: string
          format: date-time
      anyOf:
        - required: [url]
        - required: [externalId]
    RelatedPlaceInput:
      type: object
      required: [placeId]
      properties:
        placeId:
          type: string
          format: uuid
        relationType:
          $ref: "#/components/schemas/RelatedPlaceRelationType"
          default: nearby
        note:
          type: string
          maxLength: 1000
        evidence:
          type: object
          description: Agent-maintained relation evidence such as distance meters, address match, source URLs, or audit batch id. For lodging/resort parent-child relations, include fields such as parentPlaceRole, childVenueRole, sameSiteName, sourceUrls, and displayNote when available. For itinerary_cluster relations, include fields such as clusterName, sharedDriveBurden, mealRestFallback, parentEffortNotes, and sourceUrls when available.
          additionalProperties: true
    PricingItem:
      type: object
      required: [label]
      properties:
        label:
          type: string
          description: Human-readable price row such as child 2-hour pass, guardian entry, infant free condition, weekday rate, or reservation price.
        amount:
          type: integer
          minimum: 0
          maximum: 100000000
          description: Local-currency amount when the source provides a fixed numeric price. Omit instead of guessing.
        currency:
          type: string
          enum: [KRW, USD, JPY, PHP, VND, SGD, MYR, THB, TWD, HKD, AUD, EUR, GBP]
          default: KRW
        unit:
          type: string
          description: Price unit such as person, child, guardian, 2 hours, night, or session.
        ageRange:
          type: string
          description: Source-backed age/person condition for this price row.
        conditions:
          type: string
          description: Weekday/weekend, reservation, companion, free-entry, or time-limit conditions.
        notes:
          type: string
        sourceUrl:
          type: string
          format: uri
    Pricing:
      type: object
      description: Source-backed fee summary for paid places. Prices change often, so include `basisDate` or `checkedAt` whenever prices are known and omit unknown amounts instead of estimating.
      properties:
        summary:
          type: string
          maxLength: 1000
          description: Compact parent-facing summary shown on cards/details.
        currency:
          type: string
          enum: [KRW, USD, JPY, PHP, VND, SGD, MYR, THB, TWD, HKD, AUD, EUR, GBP]
          default: KRW
        basisDate:
          type: string
          format: date
          description: Date the listed prices apply to or were published, in YYYY-MM-DD.
        checkedAt:
          type: string
          format: date-time
          description: Agent/source verification timestamp for the price information.
        staleAfterDays:
          type: integer
          minimum: 1
          maximum: 730
          description: Optional freshness window after which the UI should show the price as needing recheck.
        items:
          type: array
          maxItems: 50
          items:
            $ref: "#/components/schemas/PricingItem"
        sourceUrl:
          type: string
          format: uri
        sourceTitle:
          type: string
        notes:
          type: string
    ReviewSearchEvidenceItem:
      type: object
      required: [query]
      properties:
        query:
          type: string
          maxLength: 200
          description: Search query used to find parent-facing review evidence.
        searchedAt:
          type: string
          format: date-time
        sourceUrl:
          type: string
          format: uri
        language:
          type: string
          maxLength: 50
        countryCode:
          type: string
          pattern: "^[A-Z]{2}$"
        city:
          type: string
          maxLength: 200
        accessStatus:
          type: string
          enum: [opened, snippet_only, blocked, not_found]
          description: Whether the source was opened directly or only search/snippet evidence was available.
        snippetSummary:
          type: string
          maxLength: 1000
          description: Agent-written summary of visible search or review evidence; do not copy long source text.
        confidence:
          type: string
          enum: [low, medium, high]
    PlaceWritableFields:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        slug:
          type: string
        primaryCategory:
          $ref: "#/components/schemas/PrimaryCategory"
        tags:
          type: array
          items:
            type: string
          maxItems: 50
        description:
          type: string
          maxLength: 5000
        address:
          type: string
        roadAddress:
          type: string
        regionSido:
          type: string
        regionSigungu:
          type: string
        regionDong:
          type: string
        countryCode:
          type: string
          pattern: "^[A-Z]{2}$"
          description: ISO 3166-1 alpha-2 country code for overseas or country-scoped places. Create requests with a Korean region/address default this to `KR` when omitted.
        countryName:
          type: string
          maxLength: 200
          description: Source-backed country display name when the place is outside Korea or country context matters.
        city:
          type: string
          maxLength: 200
          description: Overseas city or primary locality used for filtering and display.
        locality:
          type: string
          maxLength: 200
          description: District, island, resort area, or local neighborhood below city level.
        localCurrency:
          type: string
          enum: [KRW, USD, JPY, PHP, VND, SGD, MYR, THB, TWD, HKD, AUD, EUR, GBP]
          description: Default local currency for source-backed pricing at this place.
        lat:
          type: number
          minimum: -90
          maximum: 90
        lng:
          type: number
          minimum: -180
          maximum: 180
        phone:
          type: string
        officialUrl:
          type: string
          format: uri
        reservationUrl:
          type: string
          format: uri
        kakaoPlaceUrl:
          type: string
          format: uri
        kakaoPlaceId:
          type: string
        contact:
          type: object
          description: Backward-compatible write alias for contact fields. Values are persisted to the same top-level `phone`, `officialUrl`, `reservationUrl`, `kakaoPlaceUrl`, and `kakaoPlaceId` columns unless those top-level fields are also provided.
          properties:
            phone:
              type: string
            officialUrl:
              type: string
              format: uri
            reservationUrl:
              type: string
              format: uri
            kakaoPlaceUrl:
              type: string
              format: uri
            kakaoPlaceId:
              type: string
        externalRefs:
          type: object
          description: Optional external reference object used for JSON containment duplicate matching against stored `externalRefs`. Agents may store public parent-inspection links such as `infoLinks` and `reviewLinks` here.
          additionalProperties: true
        playFeatures:
          $ref: "#/components/schemas/PlayFeatures"
        taxonomy:
          $ref: "#/components/schemas/PlaceTaxonomy"
        pricing:
          $ref: "#/components/schemas/Pricing"
        reviewSearchEvidence:
          type: array
          maxItems: 50
          description: Agent-maintained parent-review search evidence, useful when official sources and parent snippets must be distinguished.
          items:
            $ref: "#/components/schemas/ReviewSearchEvidenceItem"
        routeSupport:
          $ref: "#/components/schemas/RouteSupport"
        imageUrls:
          type: array
          deprecated: true
          description: Backward-compatible legacy fallback used only when `images` is omitted. New agents should use `images`; when structured `images` are present, `imageUrls` is ignored to avoid creating unaudited pending images.
          maxItems: 20
          items:
            type: string
            format: uri
        images:
          type: array
          description: First-class image records attached to the place. Use this for audited image links, visual descriptions, and primary-image selection.
          maxItems: 30
          items:
            $ref: "#/components/schemas/PlaceImageInput"
        relatedPlaces:
          type: array
          description: Existing places that should be shown as related to this place, usually because they share a building, campus, resort, mall, or very close practical visit context.
          maxItems: 50
          items:
            $ref: "#/components/schemas/RelatedPlaceInput"
        status:
          type: string
          enum: [active, temporarily_closed, closed, draft, needs_review, merged]
        dataConfidence:
          type: string
          enum: [official_verified, operator_curated, agent_collected, user_reported, needs_check, unknown]
        placeScore:
          type: number
          minimum: 0
          maximum: 10
          description: Source-backed objective 0-10 place score assigned by agents for the family outing use case. This is not an AiGo user rating.
        placeScoreRationale:
          type: string
          maxLength: 5000
          description: Concise agent-written rationale for the objective place score.
        externalRatingScore:
          type: number
          minimum: 0
          maximum: 10
          description: Normalized 0-10 third-party review/rating signal when citeable evidence exists.
        externalReviewCount:
          type: integer
          minimum: 0
          maximum: 1000000
          description: Approximate source-backed external review count used to weight rating confidence.
        searchEvidenceScore:
          type: number
          minimum: 0
          maximum: 10
          description: Normalized 0-10 evidence/prominence score derived from public search results, listings, official pages, and corroborating sources.
        scoreSignals:
          type: object
          description: Structured source-backed scoring evidence, such as provider ratings, search-result observations, caps, conflicts, and freshness notes.
          additionalProperties: true
        scoreUpdatedAt:
          type: string
          format: date-time
          description: Timestamp when the score fields were last reviewed or recomputed.
        minRecommendedAgeMonths:
          type: integer
          minimum: 0
          maximum: 240
          description: Minimum recommended child age in months. When both age bounds are provided, this value must be less than or equal to `maxRecommendedAgeMonths`. Create/update requests may also provide `recommendedAgeMonths.min` as a payload alias, which is normalized to this field.
        maxRecommendedAgeMonths:
          type: integer
          minimum: 0
          maximum: 240
          description: Maximum recommended child age in months. When both age bounds are provided, this value must be greater than or equal to `minRecommendedAgeMonths`. Create/update requests may also provide `recommendedAgeMonths.max` as a payload alias, which is normalized to this field.
        indoorType:
          $ref: "#/components/schemas/IndoorType"
        strollerFriendly:
          $ref: "#/components/schemas/TriState"
        parkingAvailable:
          $ref: "#/components/schemas/TriState"
        parkingFrictionLevel:
          $ref: "#/components/schemas/ParkingFrictionLevel"
        peakParkingWindow:
          type: string
          maxLength: 500
          description: Source-backed time window when parking is most likely to be difficult.
        parkingWaitNote:
          type: string
          maxLength: 1000
          description: Practical parent note about parking entry, queues, validation, or fallback lots.
        nursingRoom:
          $ref: "#/components/schemas/TriState"
        diaperChangingTable:
          $ref: "#/components/schemas/TriState"
        kidsToilet:
          $ref: "#/components/schemas/TriState"
        elevator:
          $ref: "#/components/schemas/TriState"
        babyChair:
          $ref: "#/components/schemas/TriState"
        foodAllowed:
          $ref: "#/components/schemas/TriState"
        reservationRequired:
          $ref: "#/components/schemas/TriState"
          description: Whether advance reservation is required for a normal family visit.
        walkInAvailable:
          $ref: "#/components/schemas/TriState"
          description: Whether same-day walk-in entry is normally possible.
        sessionBased:
          $ref: "#/components/schemas/TriState"
          description: Whether visits are organized into fixed sessions or entry windows.
        sameDayAvailabilityKnown:
          $ref: "#/components/schemas/TriState"
          description: Whether same-day availability can be checked from source-backed public information.
        averageStayMinutes:
          type: integer
          minimum: 0
          maximum: 1440
        parentEffortLevel:
          type: integer
          minimum: 1
          maximum: 5
        childEngagementLevel:
          type: integer
          minimum: 1
          maximum: 5
        rainyDayScore:
          type: integer
          minimum: 1
          maximum: 5
        hotDayScore:
          type: integer
          minimum: 1
          maximum: 5
        coldDayScore:
          type: integer
          minimum: 1
          maximum: 5
        safetyNotes:
          type: string
          maxLength: 5000
        parentNotes:
          type: string
          maxLength: 5000
        openingHours:
          description: Flexible operating-hours metadata. For accommodations, use `openingHours.lodgingStayWindow.checkIn`, `checkOut`, and optional `sourceBacked`; detail/search derive `openingHoursSummary.lodgingStayWindow` from that nested shape.
    CreatePlaceRequest:
      allOf:
        - $ref: "#/components/schemas/PlaceWritableFields"
        - type: object
          description: Create requires either `address` or `regionSido` so the place can be grouped geographically even when one address form is unavailable.
          required: [name, primaryCategory, lat, lng, sources]
          anyOf:
            - required: [address]
            - required: [regionSido]
          properties:
            sources:
              type: array
              minItems: 1
              items:
                $ref: "#/components/schemas/SourceInput"
            actor:
              type: string
              default: agent
            changeSummary:
              type: string
              maxLength: 2000
    UpdatePlaceRequest:
      allOf:
        - $ref: "#/components/schemas/PlaceWritableFields"
        - type: object
          description: >
            Update requires source provenance. If one coordinate is changed, both `lat` and `lng` must be sent together;
            when both age bounds are sent, min must be less than or equal to max. `externalRefs` updates are deep-merged
            into the existing JSON object: omitted keys are preserved, nested objects merge recursively, and arrays/scalars/null
            replace the addressed key.
          required: [sources]
          dependentRequired:
            lat: [lng]
            lng: [lat]
          properties:
            sources:
              type: array
              minItems: 1
              items:
                $ref: "#/components/schemas/SourceInput"
            sourceMode:
              type: string
              enum: [append, replace]
              default: append
              description: Append new provenance by default. Use replace only to correct a bad import or source contamination.
            imageMode:
              type: string
              enum: [append, replace]
              default: append
              description: >
                Append image records by default; appended structured images remain secondary unless
                `isPrimary: true` is explicit. Use replace after manual visual audit to keep only meaningful active images.
            relatedPlaceMode:
              type: string
              enum: [append, replace]
              default: append
              description: Append related-place pairs by default. Use replace to rewrite this place's current relationship set.
            actor:
              type: string
              default: agent
            changeSummary:
              type: string
              maxLength: 2000
    SearchPlacesRequest:
      type: object
      properties:
        visitContext:
          type: string
          enum: [afterDaycare, nearbyNow, rainyDay, weekendHalfDay, dayTrip]
          description: Soft ranking context for common parent outing scenarios.
        visitDate:
          type: string
          format: date
          description: Planned local visit date used for opening-hours scoring. When omitted, immediate searches use the current service date/time.
        visitStartTime:
          type: string
          pattern: "^([01]\\d|2[0-3]):[0-5]\\d$"
          description: Planned local visit start time in 24-hour `HH:mm` format. Requires `visitDate`; when omitted with `visitDate`, search evaluates opening hours at noon.
        origin:
          $ref: "#/components/schemas/Origin"
        location:
          $ref: "#/components/schemas/Origin"
          deprecated: true
          description: Backward-compatible alias for `origin`; prefer `origin` in new agent calls.
        radiusKm:
          type: number
          default: 80
          maximum: 500
        filterByRadius:
          type: boolean
          default: true
          description: When false, keep `origin` for distance calculation and scoring but do not restrict results to `radiusKm`. Useful for lodging/destination searches.
        viewportBounds:
          $ref: "#/components/schemas/ViewportBounds"
        minDistanceKm:
          type: number
          minimum: 0
          maximum: 500
          description: >-
            Hard lower distance bound from `origin`. Useful for outside-city or farther day-trip planning; requires `origin`.
        maxDistanceKm:
          type: number
          minimum: 0
          exclusiveMinimum: true
          maximum: 500
          description: >-
            Hard upper distance bound from `origin`. Use with `filterByRadius: false` when this explicit band should replace the default radius filter; requires `origin`.
        diversity:
          type: object
          description: Optional post-ranking caps that keep agent planning results from over-concentrating in one region or category.
          properties:
            maxPerRegion:
              type: integer
              minimum: 1
              maximum: 20
              description: Maximum number of results per `regionSido` + `regionSigungu` group before pagination.
            maxPerCategory:
              type: integer
              minimum: 1
              maximum: 20
              description: Maximum number of results per primary category before pagination.
        query:
          type: string
          minLength: 1
        matchMode:
          type: string
          enum: [keyword, exactName]
          default: keyword
          description: Use `exactName` for deterministic place-name lookup; it matches exact, whitespace-compacted, externalRefs.aliases, externalRefs.koreanSearchAliases, and known retail-chain alias place names instead of broad keyword/tag text.
        includeStatuses:
          type: array
          maxItems: 2
          description: Agent/admin audit option. Defaults to active-only search; include `temporarily_closed` when exact-name or duplicate-precheck workflows must find canonical temporary-closure records before staging creates. Permanently `closed`, `draft`, and `needs_review` records are intentionally not accepted here.
          items:
            type: string
            enum: [active, temporarily_closed]
        countryCode:
          type: string
          pattern: "^[A-Z]{2}$"
          description: Optional country scope for overseas place search.
        regionSido:
          type: string
          description: Optional Korean province/metropolitan-city scope for domestic place search. Common aliases such as `서울`, `경기`, and `부산` are normalized by the API.
        regionSigungu:
          type: string
          description: Optional Korean city/district scope for domestic place search. Use with `regionSido` when a narrower exact administrative scope is needed.
        city:
          type: string
          maxLength: 200
          description: Optional city/locality scope for overseas place search.
        primaryCategories:
          type: array
          maxItems: 30
          items:
            type: string
        representativeVisit:
          type: boolean
          description: When true, rank broad regional browsing results toward major family destinations such as zoos, museums, science centers, aquariums, arboretums, and large public attractions while de-emphasizing ordinary shopping fallback places.
        playgroundOnly:
          type: boolean
          description: >-
            When true, restrict playground-style searches to indoor playgrounds or park records with playground evidence such as play-equipment tags, playground-like names, or positive place-level playFeatures.
        kidsCafeOnly:
          type: boolean
          description: >-
            When true, restrict kids-cafe searches to commercial/private play-cafe records, including legacy indoor_playground rows with source or tag evidence such as kids-cafe names, brand/operator tags, party-room/cafe signals, or paid commercial play branding.
        tags:
          type: array
          description: Soft matching signal. Tags do not exclude candidates.
          maxItems: 30
          items:
            type: string
        taxonomy:
          $ref: "#/components/schemas/SearchTaxonomyRequest"
        childAgeMonths:
          type: array
          description: Soft matching signal. Age mismatch does not exclude candidates.
          maxItems: 10
          items:
            type: integer
            minimum: 0
            maximum: 240
        childAgesMonths:
          type: array
          deprecated: true
          description: Backward-compatible alias for `childAgeMonths`; prefer `childAgeMonths`.
          maxItems: 10
          items:
            type: integer
            minimum: 0
            maximum: 240
        preferences:
          type: object
          description: >-
            Search filter preference signals for high-value parent decisions. Defaults to soft ranking; set `preferenceMode: required` to exclude unknown or mismatched facility values.
          properties:
            indoorTypes:
              type: array
              items:
                $ref: "#/components/schemas/IndoorType"
            parkingAvailable:
              type: boolean
            toiletNearby:
              type: boolean
              description: Prefer places with nearby toilet evidence, using `playFeatures.toiletNearby` and kids-toilet evidence as soft ranking signals.
            strollerFriendly:
              type: boolean
            elevator:
              type: boolean
            nursingRoom:
              type: boolean
            diaperChangingTable:
              type: boolean
            kidsToilet:
              type: boolean
            babyChair:
              type: boolean
            foodAllowed:
              type: boolean
        preferenceMode:
          type: string
          enum: [soft, required]
          default: soft
          description: Controls whether `preferences` are soft ranking signals or required filters. In `required` mode, positive search filter preferences require `yes` or `partial` evidence and indoorTypes must match.
        sort:
          type: string
          enum: [recommended, distance, rating, updatedAt]
          default: recommended
          description: Sort order. `recommended` is shown as 관련도 and ranks by contextual search relevance. `distance` is shown as 거리 and ranks nearest first. `rating` is shown as 평가 and ranks by the source-backed place evaluation score, not user visit star ratings. `updatedAt` is for operational/API use.
        projection:
          type: string
          enum: [full, compact]
          default: full
          description: Use `compact` to return lightweight search items for planning and agent calls. Default `full` preserves the complete card/detail-oriented item shape.
        coursePlan:
          type: boolean
          default: false
          description: When true, include a lightweight role-based itinerary/course plan in response meta using the ranked result set.
        limit:
          type: integer
          minimum: 1
          maximum: 300
          default: 20
        offset:
          type: integer
          minimum: 0
          maximum: 1000
          default: 0
    PlaceImageInput:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
        sourceId:
          type: string
          format: uuid
          description: Optional existing source row id. Prefer sourceUrl/sourceType when the source row is being appended in the same request.
        sourceUrl:
