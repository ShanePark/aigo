          nullable: true
        externalRatingScore:
          type: number
          minimum: 0
          maximum: 10
          nullable: true
        externalReviewCount:
          type: integer
          minimum: 0
          nullable: true
        searchEvidenceScore:
          type: number
          minimum: 0
