          maximum: 5
        childEngagementLevel:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5
        rainyDayScore:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5
        hotDayScore:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5
        coldDayScore:
          type: integer
          nullable: true
          minimum: 1
          maximum: 5
        reservationRequired:
          $ref: "#/components/schemas/TriState"
        walkInAvailable:
          $ref: "#/components/schemas/TriState"
        sessionBased:
          $ref: "#/components/schemas/TriState"
        sameDayAvailabilityKnown:
          $ref: "#/components/schemas/TriState"
    PlaceNotes:
      type: object
      required: [safety, parent]
      properties:
        safety:
          type: string
          nullable: true
        parent:
          type: string
          nullable: true
    Source:
      allOf:
        - $ref: "#/components/schemas/SourceInput"
        - type: object
          required: [id, sourceType, checkedAt, createdAt]
          properties:
            id:
              type: string
              format: uuid
            checkedAt:
              type: string
              format: date-time
              nullable: true
            createdAt:
              type: string
              format: date-time
    PlaceVersionSummary:
      type: object
      required: [id, versionNumber, action, actor, createdAt]
      properties:
        id:
          type: string
          format: uuid
        versionNumber:
          type: integer
        action:
          type: string
          enum: [create, update]
        actor:
          type: string
        changeSummary:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    DeletePlaceResponse:
      type: object
      required: [id, name, deleted, deletionMode, status]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        deleted:
          type: boolean
        deletionMode:
          type: string
          enum: [soft]
        status:
          type: string
          enum: [closed]
        actor:
          type: string
        changeSummary:
          type: string
    PlaceVersion:
      allOf:
        - $ref: "#/components/schemas/PlaceVersionSummary"
        - type: object
          required: [snapshot, sources]
          properties:
            snapshot:
              type: object
              additionalProperties: true
            sources:
              type: array
              items:
                $ref: "#/components/schemas/SourceInput"
    PlaceDetail:
      type: object
      required:
        - id
        - name
        - primaryCategory
        - tags
        - region
        - lat
        - lng
        - contact
        - externalRefs
        - imageUrls
        - primaryImage
        - images
        - relatedPlaces
        - sourceSummary
        - playFeatures
        - pricing
        - status
        - dataConfidence
        - scoring
        - recommendedAgeMonths
        - facilities
        - visit
        - notes
        - openingHoursSummary
        - version
        - createdAt
        - updatedAt
        - sources
        - versions
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
          nullable: true
        primaryCategory:
          type: string
        tags:
          type: array
          items:
            type: string
        description:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        roadAddress:
          type: string
          nullable: true
        region:
          type: object
          required: [sido, sigungu, dong]
          properties:
            sido:
              type: string
              nullable: true
            sigungu:
              type: string
              nullable: true
            dong:
              type: string
              nullable: true
        lat:
          type: number
        lng:
          type: number
        contact:
          type: object
          properties:
            phone:
              type: string
              nullable: true
            officialUrl:
              type: string
              nullable: true
            reservationUrl:
              type: string
              nullable: true
            kakaoPlaceUrl:
              type: string
              nullable: true
            kakaoPlaceId:
              type: string
              nullable: true
        externalRefs:
          type: object
          description: External references and agent-maintained link collections, including optional `infoLinks` for parent-facing official/listing/detail pages and `reviewLinks` for public review/listing/search pages.
          additionalProperties: true
        imageUrls:
          type: array
          deprecated: true
          description: Backward-compatible URL list derived from active `place_images`.
          items:
            type: string
            format: uri
        primaryImage:
          anyOf:
            - $ref: "#/components/schemas/PlaceImage"
            - type: "null"
        images:
          type: array
          description: First-class image entities, ordered by primary image and sort order.
          items:
            $ref: "#/components/schemas/PlaceImage"
        relatedPlaces:
          type: array
          description: Bidirectional related-place summaries for nearby/same-building/same-site browsing.
          items:
            $ref: "#/components/schemas/RelatedPlace"
        sourceSummary:
          $ref: "#/components/schemas/SearchSourceSummary"
        playFeatures:
          $ref: "#/components/schemas/PlayFeatures"
        pricing:
          $ref: "#/components/schemas/Pricing"
        status:
          type: string
        dataConfidence:
          type: string
        scoring:
          $ref: "#/components/schemas/PlaceScoring"
        recommendedAgeMonths:
          $ref: "#/components/schemas/RecommendedAgeMonths"
        facilities:
          $ref: "#/components/schemas/Facilities"
        visit:
          $ref: "#/components/schemas/VisitSignals"
        notes:
          $ref: "#/components/schemas/PlaceNotes"
        openingHours: {}
        openingHoursSummary:
          $ref: "#/components/schemas/OpeningHoursSummary"
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastVerifiedAt:
          type: string
          format: date-time
          nullable: true
        sources:
          type: array
          items:
            $ref: "#/components/schemas/Source"
        versions:
          type: array
          items:
            $ref: "#/components/schemas/PlaceVersionSummary"
