        sourceId:
          type: string
          format: uuid
          nullable: true
        sourceUrl:
          type: string
          format: uri
          nullable: true
        sourceType:
          type: string
          nullable: true
        sourceTitle:
          type: string
          nullable: true
        displayTier:
          type: string
          description: Coarse provenance tier for UI and agent trust decisions.
          enum: [official, public_agency, public_listing, rights_unclear, unknown]
        creditText:
          type: string
        altText:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        visualFeatures:
          type: array
          items:
            type: string
        childSignals:
          type: object
          additionalProperties: true
        width:
          type: integer
          nullable: true
        height:
          type: integer
          nullable: true
        checkedAt:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [active, archived]
        reviewStatus:
          type: string
          enum: [pending_review, approved, needs_review, rejected]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    RelatedPlace:
