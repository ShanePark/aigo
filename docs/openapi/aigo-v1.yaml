    OpeningHoursSummary:
      type: object
      description: Search/detail operating-hours and booking confidence summary. This is separate from `OPEN_NOW`/`OPENING_HOURS_UNKNOWN` reason codes so source-backed but unstructured hours are still visible.
      required:
        - dataStatus
        - confidenceLevel
        - sourceBacked
        - bestSourceType
        - bestSourceTier
        - sourceCount
        - sourceTypes
        - latestCheckedAt
        - freshnessStatus
        - hasStructuredData
        - structuredDataGaps
      properties:
        dataStatus:
          type: string
          enum: [structured, unstructured, missing]
        confidenceLevel:
          type: string
          enum: [high, medium, source_backed, low, unknown]
        sourceBacked:
          type: boolean
        bestSourceType:
          type:
            - string
            - "null"
        bestSourceTier:
          type: string
          enum: [official, public_agency, operator, public_listing, other, none]
        sourceCount:
          type: integer
          minimum: 0
        sourceTypes:
          type: array
          items:
            type: string
        latestCheckedAt:
          type:
            - string
            - "null"
          format: date-time
        freshnessStatus:
          type: string
          enum: [checked_today, recent, aging, stale, unchecked]
        hasStructuredData:
          type: boolean
        structuredDataGaps:
          type: array
          description: Source-backed operation fields that still need structured propagation from evidence sources.
          items:
            type: string
            enum: [openingHours, reservationRequired, walkInAvailable, sessionBased, sameDayAvailabilityKnown]
        temporaryClosure:
          type:
            - object
            - "null"
          description: Structured temporary-closure period evidence when present; this clears the generic opening-hours structure gap but still indicates the place should not be treated as currently open.
          properties:
            startsOn:
              type:
                - string
                - "null"
              description: Inclusive closure start date when known, usually `YYYY-MM-DD`.
            endsOn:
              type:
                - string
                - "null"
              description: Inclusive closure end date when known, usually `YYYY-MM-DD`.
        lodgingStayWindow:
          type:
            - object
            - "null"
          description: Accommodation-specific check-in/check-out evidence. This is visit-window readiness for lodging, not normal public opening-hours evidence.
          properties:
            checkIn:
              type:
                - string
                - "null"
              description: Check-in time in `HH:mm` when known.
            checkOut:
              type:
                - string
                - "null"
              description: Check-out time in `HH:mm` when known.
            sourceBacked:
              type: boolean
              description: Whether the lodging window came from source-linked opening-hours metadata.
