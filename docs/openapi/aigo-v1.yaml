              type:
                - integer
                - "null"
            parentEffortLevel:
              type:
                - integer
                - "null"
            childEngagementLevel:
              type:
                - integer
                - "null"
        notes:
          $ref: "#/components/schemas/PlaceNotes"
        primaryImageUrl:
          type:
            - string
            - "null"
          format: uri
        imageHealth:
          type: object
          additionalProperties: true
        sourceSummary:
          $ref: "#/components/schemas/SearchSourceSummary"
    InfantLogisticsSignal:
      type: object
      description: Search-time infant logistics evidence derived from stroller, elevator, nursing, diaper, baby-chair, and parking fields. Confidence describes how much evidence is known; support describes how useful the known evidence is.
      required:
        - confidenceLevel
        - confidenceScore
        - supportLevel
        - supportScore
        - knownCount
        - unknownCount
        - positiveSignals
        - partialSignals
        - negativeSignals
        - missingSignals
      properties:
        confidenceLevel:
          type: string
          enum: [high, medium, low, unknown]
        confidenceScore:
          type: integer
          minimum: 0
          maximum: 100
        supportLevel:
          type: string
          enum: [strong, moderate, limited, poor, unknown]
        supportScore:
          type: integer
          minimum: 0
          maximum: 100
        knownCount:
          type: integer
          minimum: 0
        unknownCount:
          type: integer
          minimum: 0
        positiveSignals:
          type: array
          items:
            type: string
        partialSignals:
          type: array
          items:
            type: string
        negativeSignals:
          type: array
          items:
            type: string
        missingSignals:
          type: array
          items:
            type: string
    SearchSourceSummary:
      type: object
      description: Compact source provenance and freshness summary for search cards and agent planning.
      required:
        - sourceCount
        - sourceTypes
        - bestSourceType
        - bestSourceTier
        - latestSourceType
        - latestCheckedAt
        - latestCreatedAt
        - freshnessStatus
        - openingHoursEvidence
      properties:
        sourceCount:
          type: integer
          minimum: 0
        sourceTypes:
          type: array
          description: Unique source types ordered by provenance strength.
          items:
            type: string
        bestSourceType:
          type:
            - string
            - "null"
        bestSourceTier:
          type: string
          enum: [official, public_agency, operator, public_listing, other, none]
        latestSourceType:
          type:
            - string
            - "null"
        latestCheckedAt:
          type:
            - string
            - "null"
          format: date-time
        latestCreatedAt:
          type:
            - string
            - "null"
          format: date-time
        freshnessStatus:
          type: string
          enum: [checked_today, recent, aging, stale, unchecked]
        openingHoursEvidence:
          $ref: "#/components/schemas/OpeningHoursEvidenceSummary"
    OpeningHoursSummary:
      type: object
      description: Search/detail operating-hours and booking confidence summary. This is separate from `OPEN_NOW`/`OPENING_HOURS_UNKNOWN` reason codes so source-backed but unstructured hours are still visible.
      required:
        - dataStatus
        - confidenceLevel
        - sourceBacked
        - bestSourceType
        - bestSourceTier
        - sourceCount
        - sourceTypes
        - latestCheckedAt
        - freshnessStatus
        - hasStructuredData
        - structuredDataGaps
      properties:
        dataStatus:
          type: string
          enum: [structured, unstructured, missing]
        confidenceLevel:
          type: string
          enum: [high, medium, source_backed, low, unknown]
        sourceBacked:
          type: boolean
        bestSourceType:
          type:
            - string
            - "null"
        bestSourceTier:
          type: string
          enum: [official, public_agency, operator, public_listing, other, none]
        sourceCount:
          type: integer
          minimum: 0
        sourceTypes:
          type: array
          items:
            type: string
        latestCheckedAt:
          type:
            - string
            - "null"
          format: date-time
        freshnessStatus:
          type: string
          enum: [checked_today, recent, aging, stale, unchecked]
        hasStructuredData:
          type: boolean
        structuredDataGaps:
          type: array
          description: Source-backed operation fields that still need structured propagation from evidence sources.
          items:
            type: string
            enum: [openingHours, reservationRequired, walkInAvailable, sessionBased, sameDayAvailabilityKnown]
    OpeningHoursEvidenceSummary:
      type: object
      required: [sourceCount, sourceTypes, bestSourceType, bestSourceTier, latestCheckedAt, freshnessStatus]
      properties:
        sourceCount:
          type: integer
          minimum: 0
        sourceTypes:
          type: array
          items:
            type: string
        bestSourceType:
          type:
            - string
            - "null"
        bestSourceTier:
          type: string
          enum: [official, public_agency, operator, public_listing, other, none]
        latestCheckedAt:
          type:
            - string
            - "null"
          format: date-time
        freshnessStatus:
          type: string
          enum: [checked_today, recent, aging, stale, unchecked]
    SearchReason:
      type: object
      required: [code, labelKo, group, tone, priority]
      properties:
        code:
          type: string
        labelKo:
          type: string
        group:
          type: string
          enum: [preference, age, distance, context, match, confidence, other]
        tone:
          type: string
          enum: [positive, partial, negative, unknown, neutral]
        priority:
          type: integer
    SearchCoursePlanCandidate:
      type: object
      required: [id, name, primaryCategory, distanceKm, score, estimatedParentEffort, driveBurden, imageHealth, reasonCodes]
      properties:
        id:
          type: string
        name:
          type: string
        primaryCategory:
          type: string
        distanceKm:
          type:
            - number
            - "null"
        score:
          type: integer
          minimum: 0
          maximum: 100
        estimatedParentEffort:
          type: integer
          minimum: 1
          maximum: 5
        driveBurden:
          type: string
          enum: [nearby, easy, moderate, heavy, unknown]
        imageHealth:
          anyOf:
            - type: object
              additionalProperties: true
            - type: "null"
        reasonCodes:
          type: array
          items:
            type: string
    SearchCoursePlan:
      type: object
      required: [anchor, optionalSecondStop, mealCareBase, napBreak, abortFallback]
      properties:
        anchor:
          anyOf:
            - $ref: "#/components/schemas/SearchCoursePlanCandidate"
            - type: "null"
        optionalSecondStop:
          anyOf:
            - $ref: "#/components/schemas/SearchCoursePlanCandidate"
            - type: "null"
        mealCareBase:
          anyOf:
            - $ref: "#/components/schemas/SearchCoursePlanCandidate"
            - type: "null"
        napBreak:
          anyOf:
            - $ref: "#/components/schemas/SearchCoursePlanCandidate"
            - type: "null"
        abortFallback:
          anyOf:
            - $ref: "#/components/schemas/SearchCoursePlanCandidate"
            - type: "null"
    SearchPlacesResponse:
      type: object
      required: [items, meta]
      properties:
        items:
          type: array
          items:
            oneOf:
              - $ref: "#/components/schemas/SearchPlaceItem"
              - $ref: "#/components/schemas/CompactSearchPlaceItem"
        meta:
          type: object
          required: [count, total, limit, offset, projection, origin, search]
          properties:
            count:
              type: integer
            total:
              type: integer
            limit:
              type: integer
            offset:
              type: integer
            projection:
              type: string
              enum: [full, compact]
            origin:
              anyOf:
                - $ref: "#/components/schemas/Origin"
                - type: "null"
            coursePlan:
              anyOf:
                - $ref: "#/components/schemas/SearchCoursePlan"
                - type: "null"
            search:
              type: object
              required: [originalQuery, normalizedQuery, appliedPreferences, preferenceSemantics, visitContext, normalized]
              description: Query normalization details for agent debugging and zero-result recovery.
              properties:
                originalQuery:
                  type:
                    - string
                    - "null"
                normalizedQuery:
                  type:
                    - string
                    - "null"
                appliedPreferences:
                  anyOf:
                    - type: object
                      additionalProperties: true
                    - type: "null"
                preferenceSemantics:
                  type: object
                  description: Explains whether facility preferences are soft ranking signals or required filters for this search.
                  required:
                    - mode
                    - requestedKeys
                    - unknownValuesRemainEligible
                    - mismatchesRemainEligible
                    - hardFilteringSupported
                  properties:
                    mode:
                      type: string
                      enum: [soft, required]
                    requestedKeys:
                      type: array
                      items:
                        type: string
                    unknownValuesRemainEligible:
                      type: boolean
                    mismatchesRemainEligible:
                      type: boolean
                    hardFilteringSupported:
                      type: boolean
                visitContext:
                  type:
                    - string
                    - "null"
                  enum: [afterDaycare, nearbyNow, rainyDay, weekendHalfDay, dayTrip, null]
                normalized:
                  type: boolean
    DuplicatePlaceRequest:
      type: object
      required: [name, lat, lng]
      properties:
        name:
          type: string
        lat:
          type: number
        lng:
          type: number
        radiusMeters:
          type: number
          default: 500
          maximum: 5000
        kakaoPlaceId:
          type: string
        externalRefs:
          type: object
          description: Optional external reference object used for JSON containment duplicate matching against stored `externalRefs`. Agents may store public parent-inspection links such as `infoLinks` and `reviewLinks` here.
          additionalProperties: true
        limit:
          type: integer
          default: 10
          maximum: 20
    DeletePlaceRequest:
      type: object
      required: [confirmation, confirmName, sources, changeSummary]
      properties:
        confirmation:
          type: string
          const: close_place
          description: Explicit confirmation token. AiGo DELETE is a source-backed soft delete, not a cascade hard delete.
        confirmName:
          type: string
          description: Must exactly match the current place name after trimming.
        sources:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/SourceInput"
        actor:
          type: string
          default: agent
        changeSummary:
          type: string
          minLength: 10
          maxLength: 2000
          description: Deletion reason or audit summary stored in the preserved version history.
    DuplicatePlaceResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            required: [place, confidence, reasonCodes, distanceMeters, nameSimilarity]
            properties:
              place:
                $ref: "#/components/schemas/PlaceDetail"
              confidence:
                type: string
                enum: [high, medium, low]
              reasonCodes:
                type: array
                items:
                  type: string
              distanceMeters:
