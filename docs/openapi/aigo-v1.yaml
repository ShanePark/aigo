          format: uuid
        name:
          type: string
        primaryCategory:
          type: string
        tags:
          type: array
          items:
            type: string
        address:
          type:
            - string
            - "null"
        lat:
          type: number
        lng:
          type: number
        distanceKm:
          type:
            - number
            - "null"
        score:
          type: integer
          minimum: 0
          maximum: 100
        reasonCodes:
          type: array
          items:
            type: string
        reasons:
          type: array
          items:
            $ref: "#/components/schemas/SearchReason"
        dataConfidence:
          type: string
        recommendedAgeMonths:
          $ref: "#/components/schemas/RecommendedAgeMonths"
        infantLogistics:
