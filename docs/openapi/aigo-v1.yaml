        - total
      properties:
        baseline:
          type: number
        placeQuality:
          type: number
        externalEvidence:
          type: number
        distance:
          type: number
          description: Always 0 for place-quality scoring because distance is search relevance.
        context:
          type: number
          description: Always 0 for place-quality scoring because visit context is search relevance.
        match:
          type: number
          description: Always 0 for place-quality scoring because query/category/tag matching is search relevance.
        age:
          type: number
          description: Always 0 for place-quality scoring because requested child ages are search relevance.
        preferences:
          type: number
        openingHours:
          type: number
          description: Always 0 for place-quality scoring because current/planned opening status is search relevance.
        visitFit:
          type: number
        confidence:
