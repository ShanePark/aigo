          additionalProperties: true
          description: 'Structured observations inferred from the image, for example `{ "slide": true, "swing": false }`.'
        displayTier:
          type: string
          enum: [official, public_agency, public_listing, rights_unclear, unknown]
        status:
          type: string
          enum: [active, archived]
        reviewStatus:
          type: string
          enum: [pending_review, approved, needs_review, rejected]
        isPrimary:
          type: boolean
        sortOrder:
          type: integer
          minimum: 0
          maximum: 1000
        width:
          type: integer
        height:
          type: integer
        checkedAt:
          type: string
          format: date-time
    PlaceImage:
      type: object
      required:
        - id
