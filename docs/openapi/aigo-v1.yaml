              enum: [find_replacement_image, find_first_image, choose_primary_image, review_or_replace_images, audit_pending_images, none]
            priorityScore:
              type: integer
            activeCount:
              type: integer
            approvedCount:
              type: integer
            needsReviewCount:
              type: integer
            pendingReviewCount:
              type: integer
            rejectedCount:
              type: integer
            archivedCount:
              type: integer
            hasPrimary:
              type: boolean
            primaryImageUrl:
              type:
                - string
