          properties:
            count:
              type: integer
              description: Number of items returned in this page after runtime scoring, diversity, offset, and limit.
            total:
              type: integer
              description: Total active candidates that matched the request after runtime scoring and diversity, before offset and limit. The API does not pre-truncate this value with a fixed SQL candidate cap.
            limit:
              type: integer
            offset:
              type: integer
            status:
              type: string
              enum: [attention, no_active_image, rejected_only, needs_review, pending_review, no_primary, healthy, primary_image_unreachable, all]
            placeIds:
              anyOf:
                - type: array
                  items:
                    type: string
                    format: uuid
