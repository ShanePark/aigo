            - type: "null"
        napBreak:
          anyOf:
            - $ref: "#/components/schemas/SearchCoursePlanCandidate"
            - type: "null"
        abortFallback:
          anyOf:
            - $ref: "#/components/schemas/SearchCoursePlanCandidate"
            - type: "null"
    SearchPlacesResponse:
      type: object
      required: [items, meta]
      properties:
        items:
          type: array
          items:
            oneOf:
              - $ref: "#/components/schemas/SearchPlaceItem"
              - $ref: "#/components/schemas/CompactSearchPlaceItem"
        meta:
          type: object
          required: [count, total, limit, offset, projection, origin, coursePlan, search]
          properties:
            count:
              type: integer
            total:
              type: integer
            limit:
              type: integer
            offset:
              type: integer
            projection:
              type: string
              enum: [full, compact]
            origin:
              anyOf:
                - $ref: "#/components/schemas/Origin"
                - type: "null"
            coursePlan:
              anyOf:
                - $ref: "#/components/schemas/SearchCoursePlan"
                - type: "null"
            search:
              type: object
              required:
                - originalQuery
                - normalizedQuery
                - locationQuery
                - temporalTerms
                - suggestedExactNameQuery
                - appliedPreferences
                - preferenceSemantics
                - visitContext
                - normalized
              description: Query normalization details for agent debugging and zero-result recovery.
              properties:
                originalQuery:
                  type:
                    - string
                    - "null"
                normalizedQuery:
                  type:
                    - string
                    - "null"
                locationQuery:
                  description: Location-only query token split from user intent when normalization leaves a region/place anchor such as 서울.
                  type:
                    - string
                    - "null"
                temporalTerms:
                  type: array
                  description: Date/time words removed from keyword matching and handled by planned-visit context when possible.
                  items:
                    type: string
                suggestedExactNameQuery:
                  description: Candidate place-name-only query when exact-name mode receives amenity or logistics words.
                  type:
                    - string
                    - "null"
                appliedPreferences:
                  anyOf:
                    - type: object
                      additionalProperties: true
                    - type: "null"
                preferenceSemantics:
                  type: object
                  description: Explains whether facility preferences are soft ranking signals or required filters for this search.
                  required:
                    - mode
                    - requestedKeys
                    - unknownValuesRemainEligible
                    - mismatchesRemainEligible
                    - hardFilteringSupported
                  properties:
                    mode:
                      type: string
                      enum: [soft, required]
                    requestedKeys:
                      type: array
                      items:
                        type: string
                    unknownValuesRemainEligible:
                      type: boolean
                    mismatchesRemainEligible:
                      type: boolean
                    hardFilteringSupported:
                      type: boolean
                visitContext:
                  type:
                    - string
                    - "null"
                  enum: [afterDaycare, nearbyNow, rainyDay, weekendHalfDay, dayTrip, null]
                normalized:
                  type: boolean
    DuplicatePlaceRequest:
      type: object
      description: Provide coordinates for radius-based duplicate checks, or address/region evidence when source-backed coordinates are unavailable.
      required: [name]
      dependentRequired:
        lat: [lng]
        lng: [lat]
      anyOf:
        - required: [lat, lng]
        - required: [roadAddress]
        - required: [address]
        - required: [regionSigungu]
        - required: [countryCode]
        - required: [city]
        - required: [kakaoPlaceId]
        - required: [externalRefs]
      properties:
        name:
          type: string
          minLength: 1
        lat:
          type: number
          description: Latitude for radius-based duplicate checks. Must be sent with `lng`.
        lng:
          type: number
          description: Longitude for radius-based duplicate checks. Must be sent with `lat`.
        address:
          type: string
          minLength: 1
          description: Source-backed 지번/지명 address used for read-only duplicate checks when coordinates are unknown.
        roadAddress:
          type: string
          minLength: 1
          description: Source-backed road address used for read-only duplicate checks when coordinates are unknown.
        regionSido:
          type: string
          description: Optional normalized province/city hint for address-based duplicate checks.
        regionSigungu:
          type: string
          minLength: 1
          description: Optional city/district hint for address-based duplicate checks when coordinates are unknown.
        countryCode:
          type: string
          pattern: "^[A-Z]{2}$"
          description: Optional country scope for overseas duplicate checks.
        city:
          type: string
          maxLength: 200
          description: Optional city/locality scope for overseas duplicate checks.
        primaryCategory:
          $ref: "#/components/schemas/PrimaryCategory"
          description: Optional candidate category used to lower confidence when a public child-support subfacility candidate conflicts with an unrelated broad destination category.
        aliases:
          type: array
          maxItems: 30
          description: Candidate aliases such as Korean travel names, official English names, and common parent-search variants.
          items:
            type: string
            minLength: 1
        radiusMeters:
          type: number
          exclusiveMinimum: 0
          default: 500
          maximum: 5000
        kakaoPlaceId:
          type: string
        externalRefs:
          type: object
          minProperties: 1
          description: Optional external reference object used for JSON containment duplicate matching against stored `externalRefs`. Agents may store public parent-inspection links such as `infoLinks` and `reviewLinks` here.
          additionalProperties: true
        projection:
          type: string
          enum: [full, compact]
          default: full
          description: Use `compact` for agent duplicate-review calls that only need candidate identity, location, status, confidence, suggestedAction, distanceMeters, and reasonCodes. The default `full` keeps complete `PlaceDetail` payloads.
        limit:
          type: integer
          minimum: 1
          default: 10
          maximum: 20
    DeletePlaceRequest:
      type: object
      required: [confirmation, confirmName, sources, changeSummary]
      properties:
        confirmation:
          type: string
          const: close_place
          description: Explicit confirmation token. AiGo DELETE is a source-backed soft delete, not a cascade hard delete.
        confirmName:
          type: string
          description: Must exactly match the current place name after trimming.
        sources:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/SourceInput"
        actor:
          type: string
          default: agent
        changeSummary:
          type: string
          minLength: 10
          maxLength: 2000
          description: Deletion reason or audit summary stored in the preserved version history.
    RetireDuplicatePlaceRequest:
      type: object
      required: [confirmation, canonicalPlaceId, sources, changeSummary]
      properties:
        confirmation:
          type: string
          const: retire_duplicate
          description: Explicit confirmation token. This endpoint is for source-backed active duplicate retirement, not closure or hard deletion.
        canonicalPlaceId:
          type: string
          format: uuid
          description: Active canonical place id that should remain searchable.
        sources:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/SourceInput"
        actor:
          type: string
          default: agent
        changeSummary:
          type: string
          minLength: 10
          maxLength: 2000
          description: Merge/retirement reason stored in the retired place version history.
    DuplicatePlaceResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            required: [place, confidence, reasonCodes, suggestedAction, outsideRadiusReviewOnly, distanceMeters, nameSimilarity]
            properties:
              place:
                oneOf:
                  - $ref: "#/components/schemas/PlaceDetail"
                  - $ref: "#/components/schemas/DuplicateCompactPlace"
                description: Full place detail by default, or a compact identity/location subset when `projection` is `compact`.
              confidence:
                type: string
                enum: [high, medium, low]
              reasonCodes:
                type: array
                description: Duplicate-match explanation codes such as KAKAO_PLACE_ID_MATCH, EXTERNAL_REF_MATCH, ADDRESS_MATCH, REGION_MATCH, ADDRESS_REGION_CONFLICT, GENERIC_BRANCH_NAME, GENERIC_ALIAS_REVIEW_ONLY, BRANCH_SIBLING_REVIEW_ONLY, PUBLIC_SUBFACILITY_REVIEW_ONLY, PUBLIC_SAME_SITE_SUBFACILITY_REVIEW_ONLY, PUBLIC_PROVIDER_SIBLING_REVIEW_ONLY, SAME_BUILDING_REVIEW_ONLY, TENANT_PARENT_REVIEW_ONLY, SAME_SIDO_GENERIC_REVIEW_ONLY, UNRELATED_BRANCH_CATEGORY_REVIEW_ONLY, GEO_NEAR, GEO_OUTSIDE_REQUEST_RADIUS, OUTSIDE_RADIUS_REVIEW_ONLY, and NAME_SIMILAR.
                items:
                  type: string
              suggestedAction:
                type: string
                enum: [update_existing, manual_duplicate_review, hold_duplicate_review]
                description: Safe default action for automation clients. `hold_duplicate_review` means the candidate is review-only and must not be patched without stronger identity evidence such as provider id, external refs, same address, or same district. `manual_duplicate_review` is also used for branch-sibling, same-building/tenant, or generic public-facility alias cautions where name or address similarity is useful context but not identity proof.
              reviewBucket:
                type: string
                enum: [identity, relationship_context, sibling_branch_review, low_priority_noise]
                description: Operator-facing review bucket. Use `relationship_context` for same-address or same-district subfacility/parent-child leads. Use `sibling_branch_review` and `low_priority_noise` to deprioritize generic alias, branch sibling, address-region-conflicting public subfacility, same-province, unrelated category, or outside-radius candidates that are useful context but weak identity evidence.
              relationshipHint:
                type: string
                nullable: true
                enum: [same_building, parent_child]
                description: Optional relationship candidate when the match looks useful as same-building or parent-child context but lacks strong identity evidence. Use this to create `relatedPlaces` evidence instead of treating the candidate as the same place.
              outsideRadiusReviewOnly:
                type: boolean
                description: True when the candidate matched by weak name/alias/region evidence outside the requested radius without strict identity evidence such as same address, external refs, or provider id.
              distanceMeters:
                type: number
                nullable: true
              nameSimilarity:
                type: number
                nullable: true
