name: AiGo CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: aigo-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build:check

      - name: Build Docker image
        run: docker build --pull -t aigo-ci:${{ github.sha }} .

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Notify Slack deployment start
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            exit 0
          fi

          short_sha="${COMMIT_SHA::7}"
          payload="$(jq -n \
            --arg text ":baby: AiGo 배포를 시작했어요. 앱이 잠시 재시작될 수 있습니다. (${short_sha})" \
            '{username: "AiGo Deploy", icon_emoji: ":baby:", text: $text}')"

          curl -fsS -X POST -H "Content-Type: application/json" --data "$payload" "$SLACK_WEBHOOK_URL"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.SSH_IP }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          envs: DEPLOY_PATH
          script: |
            set -euo pipefail
            cd "${DEPLOY_PATH:-/home/shane/aigo}"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            docker compose up -d --build --remove-orphans
            docker image prune -f

      - name: Notify Slack deployment success
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            exit 0
          fi

          short_sha="${COMMIT_SHA::7}"
          payload="$(jq -n \
            --arg text ":child: AiGo 앱이 올라왔어요. main 배포 완료. (${short_sha})" \
            '{username: "AiGo Deploy", icon_emoji: ":child:", text: $text}')"

          curl -fsS -X POST -H "Content-Type: application/json" --data "$payload" "$SLACK_WEBHOOK_URL"

      - name: Notify Slack deployment failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            exit 0
          fi

          short_sha="${COMMIT_SHA::7}"
          payload="$(jq -n \
            --arg text ":children_crossing: AiGo 배포가 실패했어요. 앱 상태를 확인해주세요. (${short_sha})" \
            '{username: "AiGo Deploy", icon_emoji: ":children_crossing:", text: $text}')"

          curl -fsS -X POST -H "Content-Type: application/json" --data "$payload" "$SLACK_WEBHOOK_URL"
