name: aigo-dev

services:
  postgres:
    image: postgis/postgis:17-3.5-alpine
    platform: linux/amd64
    container_name: aigo-dev-db
    environment:
      POSTGRES_DB: aigo
      POSTGRES_USER: aigo
      POSTGRES_PASSWORD: aigo
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      TZ: Asia/Seoul
    ports:
      - "5431:5432"
    volumes:
      - ./db:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aigo -d aigo"]
      interval: 10s
      timeout: 5s
      retries: 5
